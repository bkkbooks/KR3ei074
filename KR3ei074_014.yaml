body:
  text: 卷之十四預防難産丹溪云世之難産往往見於鬱悶安逸之人富貴奉養之家若貧賤辛苦者無有也方書止有瘦胎飲一論而其方為湖陽公主設也實非極至之言何者有此方其難自若豫族妹苦於難産正與湖陽公主相反今其有娠五六個月遂於大全方紫蘇飲加補氣藥與十數帖因得男而甚快遂以此方隨母之形色性稟參以時令加減與之無不應者因名曰達生散大腹皮三錢人參五分陳皮五分白朮一錢白芍一錢炙草二錢紫蘇梗葉五分歸身一錢入青蔥五葉黃楊腦七個此即黃楊樹葉梢兒也或加枳殼砂仁以水煎食後服於八九月服數十帖甚得力夏加黃芩冬不必加春加川芎或有別症以意消息氣虛加參術氣實香附陳皮血虛倍歸芎形實倍紫蘇性急加黃連有熱加黃芩濕痰加滑石半夏食積加山楂食後易飢倍黃楊腦腹痛加木香桂豫族妹苦於難産後遇胎孕則觸去之豫甚憫焉説其形肥而勤於針指靜思旬日忽自悟曰此症與湖陽公主相反彼奉養之人其氣必實耗其氣使和平故易産今形肥知其氣虛久坐知其不運而其氣愈弱久坐胞胎因母氣不能自運爾當補其母之氣則兒健而易産今其有孕至五六個月遂與達生散十帖遂得男而甚快又云難産多是氣血虛亦有氣血凝滯而不能轉運者亦有八九個月內不能謹欲者丹溪束胎丸至七八個月內服之黃芩夏一兩秋七錢冬五錢春七錢白朮二兩茯苓七錢五分陳皮三兩並不見火上為末粥丸梧桐子大每服三四十丸白湯下又方第九個月服黃芩一兩酒炒焦怯弱者減半白朮一兩枳殼炒七錢半滑石七錢半小便多者去之上為末粥丸梧桐子大每三十丸空心白湯下多則恐損元氣劉宗厚按世俗婦室妊娠鮮有服束胎藥者蓋局方良方諸法未能盡其妙用者多輒動娠故率不敢行然丹溪先生因系以上三方以備世俗取擇好生君子之一端也密齋云婦女之懷胎有膏粱藜藿勞逸苦樂之殊豈必人人有産難之厄哉自湖陽公主後始有瘦胎之論前此有寤生者豈無法耶今之娠婦未有盡服束胎藥者蓋生育者婦人之常非病也故不用藥耳惟素有産難之苦者不得不講求其方以為保生之計其束胎之方用各不同如枳殼瘦胎散及用滑石方氣實多痰者宜用之達生散束胎丸氣虛血少有熱者宜用之若不審其虛實不若不服之善也蘄水朱宅一婦女李氏嘗苦難産其夫階情叩師求方且曰形頗壯性急食少豫思此氣滯也與一方枳殼甘草香附子為主當歸川芎白朮陳皮佐之至八九個月內每月服三帖後生三子甚快張氏方臨月服之束胎易産行氣寬膈枳殼五兩炒甘草兩半香附子二兩半上為末薑湯點服難産七因全著一因安逸蓋婦人懷娠血以養之氣以護之宜常行動使氣血周流胞胎活潑不可久坐久臥也今富貴之家愛惜娠婦惟恐勞役任其安逸久坐久臥以致氣滯而不運血滯而不流胎亦沉滯而不轉動故誕彌厥月而難産矣試觀貧賤之婦親執井臼之勞勤動不倦生育甚易者彼何如哉若是難産者宜於八九個月常服達生散二因奉養蓋胎之肥瘦氣通於母母之所嗜胎之所養也故懷胎之婦宜節飲食淡滋味一切肥甘之味皆當遠之不惟母無産厄子亦少病矣今富貴之家惑於俗論謂非辛熱則胎不暖非肥膿則胎不長恣食厚味而不知節以致胎肥而難産也試觀糟粳之婦藜藿之腸何以無産厄哉是以難産者宜於八九月間多服瘦胎散及張氏方三因淫欲蓋古者婦人懷娠之後即居側室不共夫寢者保養胎氣也今之為夫者縱欲而不休為婦者貪歡而無忌至七八個月之間胎形已俱情欲猶昔以致敗精濁液黏滯胞胎故臨産不利也何以知之其子生下頭上有白膜一片俗呼為戴漿生者是已若此者宜服瘦胎丸加滑石四因憂疑按兵法曰禁祥去疑恐惑衆也而今人家求子之心既切保胎之計甚疏或問命卜或禱鬼神殊不知談其禍福者惑人之聽信於祈禱者干鬼神之怒此等無益之事適增有娠之憂心常疑懼産必艱難也若此者必戒卜筮常使娠婦聞正言見善事為貴觀不正之女多産厄者可以理會五因軟弱如少婦初産者神氣怯弱子戶狹隘常懷恐怖之心不任折副之苦當産之時腰曲不伸腳直不開展轉傾側兒不得出又如中年婦人生育既多氣血亦損當産之時氣虛血少生理不遂若是二者淹延數日針藥不施母子獲安者鮮矣六因倉皇娠婦臨産自覺兒身轉移胞漿流溢腰腹急痛門戶張迫當是時也兒欲奔出母則著力一送兒便下矣若兒身未轉胞漿未破腹中陳痛乍作乍止當是之時寬心忍耐直待如上形狀然後使力可也有等粗俗穩婆不認正産弄産但見腹痛遽令努力娠婦無主只得聽從以致或逆或橫子母殞命皆倉皇之失也七因虛乏娠婦當産之時胞漿已破著力逼送視兒欲出之勢或急或緩順其勢而利之可也若使兒未欲出用力太早及兒欲出母力已乏使兒留住産戶之間津液乾澀産有艱難若是者可以大補氣血催生湯救之
