body:
  text: 卷之十二妊娠吐瀉凡二論五方吐利並作者霍亂也常吐者惡阻也治法在前惟忽然嘔吐者勿認惡阻須詳審之如吐清水同食物出者寒也宜理中湯主之人參白朮各一錢炙草三分乾薑炮五分藿香葉五分水盞半煎七分入薑汁一匙如吐酸水同食物出者熱也宜加味二陳湯主之陳皮錢半白茯苓半夏炒各一錢甘草三分黃連薑汁炒吳茱萸炮去皮三分水鍾半姜五片煎服妊娠多食瓜果生冷及當風取涼則令胎冷腹脹虛疼腸內虛鳴臍下冷痛大便滑瀉宜安胎和氣飲主之訶子麵煨去核白朮各二錢陳皮良薑炒木香白芍炒陳粟米炒炙草各錢半分二帖水二鍾姜五片煎服如瀉久不止恐其傷血無以養胎宜加減八珍湯主之人參白朮白茯苓炙草當歸生地白芍阿膠各等分水鍾半煎一鍾入阿膠煎八分食前服如不止兼服三物桃花丸赤石脂白龍骨等分乾薑炒焦減半上為末粥糊丸梧桐子大每服三十丸或五十丸米飲下妊娠痢疾一論五方一案病屬濕熱努貢之時胃氣下陷胎氣墜不亟治之恐其傷胎初病腹中脹痛裡急後重宜下之三黃解毒湯主之方見前腹中微痛裡急後重用河間行氣後重自除養血則下利自止法宜芍藥湯主之白芍一錢當歸黃連各五分檳榔二分木香二分桂少許大黃三分黃芩一錢炙草二分上㕮咀水盞半煎八分食前服又芍藥柏皮丸常服白芍黃柏各二兩黃連當歸各半兩上為末水丸小豆大每五十丸陳米飲下大抵妊娠痢疾以清熱解毒為主此治濕熱之聖藥也妊娠下利赤白腸鳴後重穀道疼痛黃連阿膠丸主之黃連砂仁歸身阿膠炒白朮各一兩乾薑炒二錢半枳殼炒五錢炙甘草三錢上為末鹽梅肉三兩入少醋同杵丸陳米湯下妊娠膿血下痢狀如魚腦小腹絞痛難當地榆黃連阿膠另煎酸石榴皮等分水煎臨產痢疾用梔子燒存性末之空心熱水調下一匙甚者不過五服或用四物湯調枳殼散服效羅田典史熊鏡妻有娠先於五月病熱請女醫朱廷和治之變瘧又請萬元獻壬子舉人治之加痢至八月瘧痢並作請師調治診其脈左手沉實有力右脈浮大而虛此乃男娠內傷病也用補中益氣湯加條芩倍白朮連進十餘服瘧痢俱止後以胡連丸調理而安次年春果生一男妊娠喘嗽凡一論四方妊娠喘嗽當分二症有風寒外感者有胎氣內壅者須詳審之其風寒外感者必發熱鼻塞聲重初病之時宜發散之桔梗散主之天門冬茯苓各一錢杏仁去皮尖人參甘草桑白皮蜜炒紫蘇葉桔梗各五分麻黃去節七分姜三片水煎久嗽不止謂之子嗽引動胎氣胎必不安宜紫菀湯主之天門冬紫菀各二錢桔梗五分甘草杏仁去皮尖桑白皮蜜炒各二分半防風五分上㕮咀水二盞竹茹一塊煎八分入蜜半匙再煎一沸服如服上藥不止或痰中有血者宜門冬清肺飲主之天冬麥冬各一錢桑白皮蜜炒杏仁去皮尖黃芩五味子阿膠桔梗甘草各五分蘇葉五分烏梅肉半個水煎服痰甚加陳皮五分淡竹瀝一合有血加生地黃一錢大薊根茅根汁各一二匙妊娠七八月以後受肺與大腸之氣胎氣壅盛咳嗽喘急宜馬兜鈴散主之馬兜鈴桔梗枳殼炒甘草陳皮大腹皮蘇葉各一錢五味子七粒姜三片水煎妊娠子淋附不禁凡三論六方子淋之病須分二症一則妊母自病一則子為母病然妊母自病又分二症或服食辛燥因生內熱者或自汗自利津液燥者其子為母病亦分二症或胎氣熱壅者或胎形迫塞者症既不同治亦有別也大抵熱則清之燥則潤之壅則通之塞則行之此治之之法也娠婦奉養太厚者喜食炙煿酒面辛燥之物以致內熱小便赤澀作痛者宜加味木通湯主之木通生地黃赤芍條芩甘草梢等分淡竹葉十二片水煎妊婦嘗病自汗或因下痢後小便短少不痛者此津液不足也麥冬通草滑石各三錢當歸甘草各五錢人參細辛各一錢上為細末每服二三錢燈心煎湯空心服娠婦素淡滋味不嗜辛酸病小便赤澀而痛者此胎熱也宜冬葵子湯主之冬葵子一兩赤芍條芩各半兩赤茯苓車前子各三錢上末每二錢米飲調服不拘時如小便不通恐是轉胞加發灰少許極妙娠婦八九月胎形肥碩小便短少小腹脹身重惡寒起則暈眩欲倒此胎氣迫塞膀胱之氣不行也宜大腹皮散主之枳殼炒大腹皮甘草炙各一錢赤茯苓三錢上為末每服一錢濃煎蔥白湯下不拘時一方有黃芩一錢一娠婦淋瀝小便不通醫作轉胞治之不愈後用檳榔赤芍藥二味研末順取長流水煎湯調服效此方治男婦一切血淋及淋澀水道疼痛用之無有不效娠婦九個月後多小便不禁者胎下墜也凡見小便頻數或自出不覺其勢將產不須治之如九月以前遺尿不知出者此病也用真桑螵十二個炙焦為末空心米飲調下又方用白薇白芍藥等分為末酒調方寸匕日三服要略云娠婦小便難飲食如故歸母苦參丸主之當歸貝母苦參各四兩上為末煉蜜丸如小豆大米飲下三丸加至十丸婦人懷胎有傷腹滿不得小便從腰以下重如有水氣狀懷身七月太陰當養不養此心氣實當刺瀉勞宮及關元小便微利則愈
