body:
  text: 卷之六陰陽別論曰陰搏陽別謂之有子王太僕云陰謂尺中也搏謂搏觸於手也尺脈搏擊與寸口脈別則為娠子之兆何者陰中有別陽也轉女為男法良方論曰陽施陰受所以有娠遇三陰所會多生女子但懷娠三月名曰始胎血脈不流形象而變是知男女未定故令於滿三月間服藥方術轉令生男也其法以斧置妊婦床下擊刃向下勿令人知恐不信者待雞抱卵時仿此置窠下一窠盡出雄雞子又初覺有妊取弓弩弦縛婦人腰下滿百日去之紫宮玉女秘法也又如三月以前取雄雞尾尖上毛三莖潛安婦人臥席下勿令知之驗又取夫發及手指甲潛安婦人臥席下勿令人知之又妊娠才及三月要男者以雄黃半兩衣中帶之要生女者取雌黃帶之密齋云夫婦媾精陰陽分形陽精勝者為男陰血勝者為女固已別矣豈能轉移之耶雖三月男女分形陽精勝者為男陰血勝者為女蓋一月二月之間精血混合男女之形未彰至於三月陰陽始判震巽之索斯定故曰男女分也謂初受之氣於茲始定非謂陰陽男女初無定體必待三月而後分故可以轉移變化之耳古人留是法者必有所試陰陽變化之妙愚不得而知焉護養胎元脈經曰婦人懷胎一月之時足厥陰脈養二月足少陽脈養三月手心主脈養四月手少陽脈養五月足太陰脈養六月足陽明脈養七月手太陰脈養八月手陽明脈養九月足少陰脈養十月足太陽脈養諸陰陽各養三十日活兒手太陽少陰不養者下主月水上為乳汁活兒養母懷胎者不可灸刺其經必墮胎按巢氏病源論云婦人妊娠一月名胎胚足厥陰脈養之二月名胎膏足少陽脈養之三月名始胎手心主脈養之四月始受水精以成血脈手少陽脈養之五月始受火精以成其氣足太陰脈養之六月始受木精以成其筋足陽明脈養之七月始受金精以成其骨手太陰脈養之八月始受土精以成膚革手陽明脈養之九月始受石精以成毛髮足少陰脈養之十月五臟六腑關節人身皆備此足太陽脈養之也良方論云四時之令必始於春木故十二經之養始於肝也若足厥陰肝脈也足少陽膽脈也所以養胎一月二月也手心主心包絡脈也手少陽三焦脈也屬火而夏旺所以養胎在三月四月足太陰脾脈也足陽明胃脈屬土而旺長夏所以養胎在五月六月也手太陰肺脈也手陽明大腸脈也屬金而旺秋所以養胎在七月八月也足少陰腎脈也屬水而旺冬所以養胎在九月又況母之腎臟繫於胎是母之真氣子之所賴也至十月兒於母腹之中受足諸臟氣脈所養然後待時而生此論奧妙而有至理余書所論皆不及也良方論云然則胚胎造化之始精移氣變之後保衛輔翼固有道矣天有五氣各有所湊地有五味各有所入所湊有節適所入有度量凡所畏忌悉知戒慎資物為養者理固然也寢興以時出入以節可以高明可以周密霧露風邪不得投間而入因時為養者理固然也以致調喜怒寡嗜欲不妄作勞而氣血從之皆所以保攝妊娠使諸邪不得干焉苟為不然方授受之時一失調養則內不足以為中之守外不足以為身之強氣形弗克而疾病因之若食兔唇缺食犬無聲食雜魚而瘡癬之屬皆以食物不戒之過也心氣大驚而癲疾腎氣不足而解顱脾胃不和而羸瘦心氣虛乏而神不足之屬皆以氣血不調之過也誠能食飲知所戒推而達之五味無所傷誠能於氣之所調推而達之邪氣無所乘茲乃生育相待而成者故曰天非人不因食物所忌食犬肉令子無聲食兔肉令子缺唇雞肉合糯米同食令子生寸白蟲膾鯉同雞子食令子生暗多瘡食羊肝令子多厄難食鱉魚令子項短鴨子與桑椹同食令子到生心寒鱔魚同田雞食令子喑啞雀肉合豆醬同食令子面生黑子食螃蟹橫生食子姜令子多指生瘡食水醬令絕產食雀肉飲酒令子無恥多淫食茨菇消胎氣乾薑蒜毒胎無益黏膩難化傷胎食驢馬肉過月難產豆醬合藿同食墮胎食山羊肉子多病無鱗魚不可食菌有大毒有食者誕子多風而夭食雀腦令子雀目婦人有妊最不可針灸及亂服藥餌恐致墮胎以貽後悔驗胎法大凡婦人三月經不行宜用川芎一兩為末濃煎艾湯八分一盞空心調服之服盡覺腹中微痛則有胎矣不動者血病也若動在臍下者血癥也故脈經云一月血為閉二月若有若無三月為血積也胎前所忌藥物歌蚖班水蛭地膽蟲烏頭附子配天雄躑躅野葛螻蛄類草烏側子與虻蟲牛黃水銀並巴豆大戟蛇蛻及蜈蚣牛膝藜蘆加薏苡金石錫粉對雌雄牙硝芒硝牡丹桂蜥蜴陀僧與䗪蟲代赭蚱蟬胡腦麝芫花薇蘅草三稜槐子牽牛並皂角桃仁蠐螬及茅根欓根硇砂與乾漆亭長溲疏菌草中瞿麥櫚茹鱉爪甲蝟皮鬼箭赤頭紅馬刀石蠶衣魚等半夏南星通草同乾薑蒜雞並鴨子驢馬兔肉不須供切忌婦人產前用此歌宜記在心胸歌中半夏炒過乾薑炮過可用不必拘疑妊娠所忌切不可犯犯則損胎子母不利詳見下文婦人受胎之後常宜行動使氣血流通百脈和暢臨產無難也今之為婦者好逸惡勞喜靜懶動含羞養嬌以致氣血不行產育多苦況行住坐臥之久為皮肉筋骨之傷子在腹中氣通於母母氣既傷子亦受病又勿登高勿越險勿舉動恐致墮胎婦人懷胎常欲見美事聞善言若彼神怪之像傀儡之類必遠避之勿令見也稍有犯者兒必肖之其貌不雅居處之處欲其得軒豁明朗切忌僻靜幽暗無人相伴恐其胎氣怯弱邪氣侵犯為害甚大仁齋云婦人懷胎臟氣擁閉不可多睡不可憂懼勞役不可啖食黏滯辛辣堅硬之物又不可妄施針灸所貴時行數步調暢自適使氣得其平若酒面炙煿熱毒薰蒸若感觸風邪傳染熱氣若誤服藥餌破血動胎若七情內傷快意縱恣則易致漏胎若近產多淫觸犯胎氣則易墮落也良方云受胎之後切宜避胎殺所遊之方正月房床二月戶扇三月門四月灶五月母身六月床七月碓磨八月廁九月門十月房十一月爐灶十二月房床六甲胎神甲己日佔門乙庚日碓磨丙辛日廚灶丁壬日倉庫戊癸日房床十二支胎神子午日碓丑未日佔廁寅申日佔爐卯酉日大門辰戌日雞棲巳亥日佔床
