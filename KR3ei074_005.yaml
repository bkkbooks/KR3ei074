body:
  text: 卷之五協期篇第五種子歌云三十時中兩日半二十八九君須算落紅滿地是佳期金水過時空霍亂霍亂之後枉費功樹頭樹底覓殘紅但解開花能結子何愁丹桂不成叢仁齊云此蓋婦人月經方絶金水才生此時子宮正開乃受精結胎之候妙合太和之時過此佳期則子宮閉而不受胎矣然男女之分各有要妙存焉如月候方絶一日三日五日交會者成男二日四日六日交會者成女過此則不孕矣訣曰何為種子法經里問因由昨日紅花謝今朝是對周藍田種白玉子午敘綢繆三五成丹桂二四白梅抽此言經水未行之時血海正滿子宮未開不能受精以成其娠經水既行則子宮開血海淨斯能受其精矣昨日謂兩日半後也子午謂陰陽初動之始即復妒二卦非二時也經止後一日三日五日得奇數為陽必生男故曰丹桂成二日四日六日得偶數為陰必生女故曰白梅抽七日之後子宮復閉不成娠矣玉湖須淺泛重載卻成憂陰血先參聚陽精向後流血開包玉露平步到瀛洲淺泛者即素女論所謂九淺一深之法也蓋男女交媾淺則女美深則女傷故云重載即成憂也陰血先聚陽精後沖則血開裹精而成男陽精先至陰血後參則精開裹血而成女即斷易天玄賦所謂陽包陰則桂庭添秀陰包陽則桃洞得仙也從斯相暫別牛女隔河遊二月花開發方知喜氣優好事當傳與讒言莫妄綢此言種子之後男子別寢不可再交蓋精血初凝恐再衝擊也故古者婦人有娠即居側室以養其胎氣也二月即次月也前月經行協期種玉次月經斷真有娠矣當此之時胎教之法不可不講故常使之聽美言見好事聞詩書操弓矢淫聲邪色不可令其見聞也密齊針曰月事初下謂之紅鉛三十時足佳期不愆舊汙既去新癸未生子宮正開玉種藍田陽道剛健交接勿煩勿令氣忤必使情歡陽偶陰和雨順風恬芳花結子丹桂森森種子須得天月二德天月德合三合六合益後續世日吉正月丁壬丙辛建成收開閉二月申巳甲己建平定危成三月丁壬建執成收開四月辛丙庚乙建平滿成開五月亥寅丙辛建成收除六月甲己建除滿成閉七月癸戊丁壬建危成收八月寅亥庚乙建危成除九月丙辛建執破危成十月乙庚甲己建平成閉十一月巳申丁壬建除執破成十二月庚乙建成開閉外建成開閉俱合天喜六合益後續世在內巢氏病源云三陽所會則生男三陰所會則生女葛洪肘後方云男從父氣女從母氣聖濟經云天之德地之氣陰陽之至和相為流薄於一體因氣而左動則屬陽陽資之則成男因氣而右動則屬陰陰資之則成女乾道成男坤道成女此男女別也丹溪曰成胎以精血之後先分男女者褚澄之論愚竊惑焉復閲李東垣之方有曰經水斷後一二日血海始淨精勝其血感者成男四五日以後血脈已旺精不勝血感者成女此確論也易曰乾道成男坤道成女夫乾坤陰陽之情性也左右陰陽之道路也男女陰陽之儀象也父精母血因感而會精之施也血能攝精精成其孕此萬物資始於乾元也血成其胞此萬物資生於坤元也陰陽交媾胎孕乃凝所藏之處名曰子宮一系在下上有兩歧一達於左一達於右精勝其血則陽為之主受氣於左子宮而男形成精不勝血則陰為之主受氣於右子宮而女形成矣或曰分男分女吾知之矣男不可為父女不可為母與男女之兼形者又何如分之耶豫曰男不可為父得陽氣之虧者也女不可為母得陰氣之塞者也兼形者由陰為駁氣所乘而成其類不一以女函男有二一則遇男為妻遇女為夫一則可妻而不可夫其有具男之全者此又駁之甚者也或曰駁氣所乘獨見於陰而所乘之形又若是之不同何耶豫曰陰體虛駁氣易於乘也駁氣所乘陰陽相混無所為主不可屬左不可屬右受氣於兩岐間隨所得駁氣之輕重而成形故所兼之成形有不可得而同也愚按男女居室人之大倫交感之道雖夫婦之愚不肖可以能知能行也紀傳所載方法甚明求子之人用之無效者可以謂其人之不能行也其道則邇其事則易不可謂其人之不能行也然可語者法也不可語者意也兩意不洽故徒法不能行矣因著論於下惟高者取正焉謹按易繫辭曰天地絪縕萬物化醇男女媾精萬物化生誠哉是言也男女胥悅陰陽交通而胚胎結矣嘗觀周頌之詩云思媚其婦有依其士則夫婦親愛之情雖在田野未之忘也故於衽席之間體雖未合神已先交陽施陰受血開精合所以有子苟夫媚其婦而女心未愜則玉體才交瓊漿先吐陽精雖施而陰不受矣婦依其夫而士志或異則桃浪雖翻玉霜未滴陰血雖開而陽無入矣陰陽乖離成天地不交之否如之何其能化生萬物哉詳見下素女論或曰種子論為富貴之人立法若彼農民則不知此理而生育偏多也殊不知男女居室雖愚不肖可與能知能行焉禽獸何知而字尾亦有期耶但富貴之人身安志樂嗜欲縱而身體瘁嬌妻美妾愛博而情不專苟不立此種子之法則縱恣無度空勞神思終不成胎孕也郊野之民形苦志苦取樂不暇一夫一妻情愛不奪至如交合之時自然神思感動情意綢繆積久有餘之氣交久未合之身陽施陰受此所以交則有孕而生育之多也或曰富貴無子者信如所論不孝有三無後為大不識如之何而可使生子也曰修德以求福寡欲以養心配必擇良藥不妄餌庶乎可矣帝問曰若人無子必欲求之有法乎素女答曰求子之法須察婦人經水畢四旺日之後子宮方開可以交合而成其子按四旺日春甲乙寅卯日夏丙丁巳午日秋庚辛申酉日冬壬癸亥子日四季戊己辰戌丑未日如不值其日取四旺時行之帝曰何以為交接則成男女乎素女曰男女交合女人美快不自知覺若陰血先至陽精後沖縱氣來乘陰血開裹陽精是陰包陽則成男若陽精先至陰血未參橫氣旁來陽精開裹陰血是陽包陰則成女也帝曰夫婦有不相和悅其故何如素女曰蓋因女子不能察夫之情不曉夫婦人倫之道生育繼嗣之理但自縱心性凶頑常懷忿怨不足之意或因夫背棄自妻私淫外婦至令自己夫婦交合之時雖夫欲無休而妻情意不向反生怨惡而憎嫌也以此夫婦不相和悅雖交而情不美帝曰交媾之間情相合而意相敬何如素女曰此皆男女通曉夫婦之道陰陽交合之理自然得其情意契合故相敬也素女曰男女交合男有五傷一者男與女交合之時泄精少者為氣傷二者交合之時精出而勃者為肉傷三者交合之時泄精而多者為筋傷四者交合之時精出而不射者為骨傷五者交合之時玉莖不堅雖堅而不久者為腎傷以上五者皆因泄精過度致傷身體可不畏哉養生經云精清者肉傷精血者筋傷精赤者骨傷如此傷者病乃生焉又曰女有五傷之候一者陰戶尚閉不開不可強刺強則傷肺二者女興已動欲男男或不從興過始交則傷心心傷則經水不調三者少陰而遇老陽玉莖不堅莖舉而易軟雖入不得搖動則女傷其目必至於盲四者女經水未盡男強逼合則傷其腎五者男子飲酒大醉與女子交合莖物堅硬久刺之不止女情已過陽興不休則傷其腹愚按素女論男女五傷之候欲求子者夫婦交合之時不可不慎也其論交接之事男有四至女有九到之說辭太近褻故不收録乃竊取其意而補之雖云情欲之私實為生民之始萬化之源也夫男女未交合之時男有三至女有五至男女情動彼此神交然後行之則陰陽和暢精血合凝有子之道也若男情已至而女情未動則精早泄謂之孤陽女情已至而男情未動女興已過謂之寡陰玉函經云孤陽寡陰即不中譬取鰥夫及寡婦謂不能生育也男有三至者謂陽道奮昂而振者肝氣至也壯大而熱者心氣至也堅徑而久者腎氣至也三至俱足女心之所悅也若痿而不舉者肝氣未至也肝氣未至而強合則傷其筋其精流滴而不射矣壯而不熱者心氣未至也心氣未至而強合則傷其血其精清冷而不暖也堅而不久者腎氣未至也腎氣未至而強合則傷其骨其精不出雖出亦少矣此男子之所以求子者貴清心寡欲以養肝心腎之氣也女有五至者面上赤起媚靨乍生心氣至也眼光涎瀝斜覷送情肝氣至也低頭不語鼻中涕出肺氣至也交頸相偎其身自動脾氣至也玉戶開張瓊液浸潤腎氣至也五氣俱至男子方與之合而行九一之法則情洽意美其候亦有五也嬌吟低語心也合目不開肝也咽乾氣喘肺也兩足或曲或伸仰臥如尸脾也口鼻氣冷陰戶瀝出沾滯腎也有此五候美快之極男子識其情而採之不惟有子且有補益之助男有三至女有五至者精之動也應至而未至者神未至也故欲人動者必先移其神其神若交其精自洽然神交之道有天之所命者如姜嫄履巨人跡歆歆然若有人道之感而生稷漢薄姬夢蒼龍據腹高祖幸之而生文帝者是已有夢之所感者如斯干之詩云維熊維羆男子之祥維虺維蛇女子之祥是已若楊國忠夫人之事則未免天下後世之非笑也天寶遺事楊國忠出使於江浙其妻思念至深荏苒成病忽夢與國忠交因有娠後生男名𦨥泊至國忠使歸其妻具述夢中之事國忠曰此蓋夫人相念情感所至時人無不譏誚之素女曰男女交媾之際更有避忌切須慎之若使犯之天地奪其壽鬼神殃其身又恐生子不肖不壽之類謹守禁戒可以長生所忌之要備述於後天地震動卒風暴雨雷電交作晦朔弦望月煞日破大寒大暑日月薄蝕神佛生辰庚申甲子本命之日三元八節五月五日又有忌禁名山大川神祠社廟僧宇道觀聖賢像前井灶前後火炎鬧烘以上類目切須忌之不可交合犯之者令人壽夭小則生病或若生男令其醜貌怪相形體不全災疾夭壽又有交合禁忌神力勞倦愁悶恐懼悲憂思怒疾病走移發赤面黃酒醉食飽病體方痊女子行經以上所忌不可交合令人虛損耗散元氣可不慎之諸所禁忌敷奏於前復有五月十八日自是天地牝年之日陰陽交合之期世人須避慎不可行房犯之重則奪命輕則減壽若干此時受胎孕子母難保密齊云夫婦交合之時所當避忌者素女之論頗詳然男女無疾交會應期三虛四忌不可不講三虛者謂冬至陽生真火正伏夏至陰生真水尚微此一年之虛也上弦前下弦後月廓空此一月之虛也天地晦冥日月此一日之虛也遇此三虛須謹避之四忌者一忌本命正沖甲子庚申晦朔之日二忌大寒大暑大醉大飽之時三忌日月星辰寺觀壇廟灶冢墓之處四忌觸忤惱怒罵詈擊搏之事犯此三虛四忌者非惟無子令人夭壽上種子法見於群書所載者如此仿而行之無不驗者愚竊有說焉若彼田野之氓邪淫之女多至生育者豈皆知此種子法耶蓋待其天癸動子戶開而媾精者此鳥獸字尾之期待其男三至女五至而通體者此陰陽交感之理其機至微非文字之能盡者若夫田野之氓則交疏而情意狎邪淫之女其思切而情先交所以陰陽和而生育多也
