body:
  text: 卷之七調理胎疾仁齋安胎之法有二或因母病以致動胎者但療母病其胎自安或胎氣不堅因觸動以致母病者則安胎而母自愈以膠艾湯當歸湯各半縮砂佐之為良丹溪云天行不息所以生生而無窮産前當清熱養血為主茺蔚子活血行氣有補陰之妙命名益母以其行中有補也故曰産前無滯産後無虛黃芩乃安胎之聖藥俗以為寒而不敢用反用溫熱藥謂能養脾殊不知胎孕宜清熱養血使藥循經而不妄行乃能養胎必擇條實者用之縮砂安胎以止其痛行氣故也非八九個月不可多用金匱要略云婦人妊娠常服當歸散主之當歸川芎白芍各一兩白朮半兩條芩一兩或散或酒糊丸或湯妊娠墮胎丹溪云陽施陰化胎孕乃成血氣虛乏不足以榮養其胎則墮譬如枝枯則果落藤萎則花墜又有勞恐傷精內火便動亦能墮胎譬如風撼其木人折其枝也火能消物造化自然病源所謂風冷傷子臟而墮此未得病情者也豫見賈氏婦但有娠至三個月必墮診其脈左手大而無力重則澀知其血少也以其壯年只補中氣使血自榮時正初夏教以濃煎白朮湯下黃芩末一錢與數十帖得保全而生因而思之墮於內熱而虛者於理為多曰熱曰虛蓋孕至三月正屬相火所以易墮不然何以黃芩熟地黃阿膠等為安胎妙藥耶王節齋云婦人墮胎多在三五個月七個月而墮者除跌僕損傷不拘外若前次三個月而墮則下次必如期復然蓋先於此時受傷故後於至期必應乘其虛也遇有半産者産後須多服養氣血固胎元之藥以補其虛損下次有胎先於兩個半月後即服固胎藥十數同帖以防三月之墮至四個半月後再服八九帖防過五月又至六個半月後再服五七劑以防七月及至九個月內服丹溪達生散數十帖可保無虞其連墮數次胎元損甚者服藥須多久則可以留方用四物湯倍加人參白朮阿膠陳皮茯苓甘草艾葉條芩氣加香附縮砂痰加薑製半夏調理丹溪固胎飲常墮胎者宜服之熟地黃五分歸身人參白芍各一錢白朮錢半川芎五分陳皮一錢條芩五分甘草二分黃連少許黃柏少許桑木上羊兒藤七葉圓者即桑絡也真寄尤妙水二盞糯米五七十粒煎服血加阿膠胎氣痛加縮砂茭山云孕而多墮者男子貪淫情縱女子好欲性偏兼以好食辛酸熱物暴損衝任故有墮胎之患其膏粱與藜藿婦人不同欲之多寡故也有一等婦人有胎似乎無胎痰氣疼痛發熱醫者不明脈理妄施耗氣退熱之劑不知胎氣宜養病氣宜攻若有胎反用攻藥豈不誤矣故養胎者血也護胎者氣也或有婦人小産太多及至中年設法服藥保全但欲心不絶其性情不改百凡上氣逆損衝任因而殞命者有之故昔人有言飛禽抱卵走獸懷胎物類尚能保全産育人為萬物之靈反不及此何耶且小産甚於大産瓜果生而摘之豈不傷其枝蔓養生可不慎哉又或問豫曰今婦人小産最多往往服藥保孕鮮有效者何也豫答曰婦人縱欲恣養口體傷於衝任故有墮胎之患醫家不審氣血冷熱妄施歸芎膠艾香燥之藥因而墮者有之永為則例者亦有之世俗概用濟生寶艾附等丸以為的當殊不知前品乃溫熱之藥助火消陰之劑血熱妄行故漏胎之患必有且如果品多生春夏少結秋冬既因血漏胎反為寒治必致誤人豫特為此參出一方藥品雖少其功甚大但懷胎時自知慎重避忌服此藥可以保全遂名曰千金保孕丸杜仲八兩去粗皮以糯米煎湯拌勻炒斷絲煙塵續斷去蘆三兩上二味為細末以山藥五兩作糊為丸如桐子大每服七十空心米飲下忌酒醋戒惱怒一方用棗肉為丸又云胎墮氣血不足氣不足胎無所榮血不足胎無所養榮養失宜猶木枯果落其間過傷怒氣勞佚動胎內外冷熱傷於子臟又當量輕重而治之胎産須知云胎氣不固常小産用四物湯加炒阿膠炒黑香附白朮黃芩砂仁糯米煎服密齋預防墮胎之方莫有善於所集者惟金匱當歸散方去川芎用熟地黃加阿膠炙草若常服之尤穩更兼安胎丸一名湖蓮丸蓮肉去心二兩白朮二兩條芩二兩砂仁炒半兩共為末山藥五兩糊為丸如梧桐子大每五十米飲下妊娠漏胎要略師曰婦人有漏下者有半産後間續都不絶者有妊娠下血者假令妊娠腹中痛為胞阻膠艾湯主之川芎阿膠甘草各二錢艾葉當歸各錢半白芍熟地黃各二錢水二盞酒一盞煎一盞去滓內阿膠慢火煎令膠煬頓服之丹溪云有娠而血漏下也屬氣虛血熱可服固孕之藥方見前胎産須知條河間二黃散治胎漏下血生熟地黃等分上為末煎白朮枳殼湯下二錢或錢半劉宗厚按良方論云婦人有子之後血蓄以養胎矣豈可復能散動耶所以然者有孕而月信每至是亦未必因血盛也若謂榮血有風則經始動動以其風勝則有此例可見胎漏之因非止一端也治者宜擴充焉如血熱胎漏者用丹溪治漏下血方條芩五錢白朮一兩砂仁妙阿膠蛤粉炒成珠各三錢為細末每服二錢艾葉湯下氣血兩虛下血不止者祕傳當歸寄生湯水煎服當歸川芎艾葉白朮各一錢人參寄生川續斷熟地黃各二錢良方論妊婦全假血以養胎或因驚走或從高墜下冒涉風邪觸忤神祟以致下血胎奔上心腹中急動或血從口出皆是傷胎其下血不止胎上衝心四肢厥冷悶絶將死者阿膠炒艾各二兩青竹茹拳大白蜜二合上水六升煮艾竹茹至二升去渣入膠蜜一二沸待膠煬分作三服妊血如月信者若至胞干非特損子亦損母矣芑焙乾薑炮各半兩上為細末酒調服三錢日夜分三服立聖散治妊娠下血不止用雞肝二具以好酒一升煮熟共酒食大效密齋云女子之血在下為經水在上為乳汁一朝有娠則經水不動乳汁不行聚於子宮以養其胎也故胎之有血如魚之有水水深則魚得活水涸則魚困矣今有娠而復下血乃氣虛血虛胞中有熱不亟止之但恐血枯子命難全母亦隨斃法當用人參白朮以補其氣歸芎以補其血黃芩以清其熱生甘草以瀉其火阿膠以止其血未有不安者矣
