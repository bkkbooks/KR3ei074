body:
  text: 卷之十三妊娠轉胞仲景曰婦人本肌肥盛頭舉自滿反羸瘦頭舉中空胞系了戾亦多致此病但利小便則愈宜服腎氣丸按此方以中有茯苓故也地黃為君功在補胞方見上卷丹溪曰轉胞之病胎婦之稟受弱者憂悶多者性急躁者食味厚者庸或有之古人皆用滑利疏導藥鮮有應效因思胞不自轉為胎所壓展在一邊胞系了戾不通耳胎若舉起居於其中胞系自通水道自利然胎之墜下必有其由近吳宅寵人患此遂用四物湯加參術等藥空心飲隨以指探喉中吐出藥汁俟少頃氣定又與一帖次早亦然如是與八帖而安此法未為的確恐偶中耳後又歷用數人皆效未知果何如耶方名參朮散四物湯加人參白朮半夏陳皮甘草入姜煎空心服吳宅寵人患轉胞兩脈似澀重則弦左稍和豫曰此得之憂患澀為血少氣多則胎氣弱而不舉弦為有飲血少則胎弱氣多有飲中焦不清而隘則胞知所避而就下乃以參朮散與服去八帖而安妊娠便祕凡一方便難之病蓄熱屬血虛宜潤腸丸主之火麻子去殼取淨仁二兩淨研桃仁去皮尖另研一兩生用上和勻研極細末蜜丸梧桐子大每服三十空心枳殼湯下妊娠雜症凡十三症十三方三案娠婦冬月中寒宜理中湯加細辛主之娠婦夏月中暑宜人參白虎湯加黃連主之娠婦傷食香蘇散加白朮枳實炒黃連主之娠婦夏秋之間中濕宜平胃散加黃柏主之娠婦胎不長者血氣不足也五六月脾胃脈養之時宜十全大補湯去桂加陳皮薑棗引娠婦胎肥者八月以後胎氣壅盛宜常服枳殼散易産商州枳殼五兩炒炙粉草一兩香附炒黑一兩上為末每服二錢空心沸湯調服一方有糯米半斤炒同為末令兒易産初生胎氣微黑百日後肥白此為古方之冠若娠婦稍弱者單服恐胎寒腹痛胎弱多驚王隱君於內加當歸一兩木香半兩不見火如此用之則陽不致強陰不致弱二氣調和有益胎嗣湖陽公主胎肥難産方士進瘦胎散用枳殼四兩和甘草二兩為末空心服六錢匕茶調服妊娠胎驚者七八月以後胎形既成或因氣悶或因喧呼心神脈亂致令子驚使母心神忪悸睡里多驚坐臥不寧氣急逼迫宜服大聖散保安胎孕子母無虞白茯苓川芎麥冬炙草當歸木香人參炙耆等分上㕮咀每服七錢水鍾半姜三片煎服妊娠胎熱者皆因娠婦多居火間衣著太暖伏熱在裡又食酒面炒煿熱物太過致令胎熱頭旋眼暈視物不見腮項腫核若加涎壅命在須臾此肝臟毒熱上攻也宜消風散主之石膏炒菊花當歸羌活防風芥穗川芎白芷各錢半羚羊角半錢炙草半錢茗苦茶一錢大黃豆卷一錢分二帖水煎一娠婦將臨月兩眼忽然失明不見燈火頭痛眩暈項腮腫不能轉諸醫治療不瘥轉加危困偶得消風散服之病減七八獲安分娩其眼吊起人物不辨有人云只服四物湯加荊芥防風更服眼科天門冬飲子但以此方間服目漸稍明大忌酒面煎炙雞魚鵝鴨豆腐辛辣熱毒物並房勞不然則眼不復明也天門冬飲子天門冬茺蔚子知母各二錢四分茯苓羌活五味子人參各一錢八分防風二錢一分㕮咀分二帖每水二盞姜三片煎八分服妊婦七八月忽然無故悲傷欲哭狀如神靈所作數缺伸者此名臟躁乃肺也宜甘麥大棗湯主之出要略甘草二兩小麥一升大棗十枚三味以水六升煮取三升分三服妊娠失音不語奇病論帝問曰人有重身九月而喑者何也岐伯對曰胎之絡脈絶也胎絡者繫於少陰之脈貫腎絡舌本故不能言帝曰治之奈何岐伯曰無治也當十月復婦人有娠故服毒藥攻胎藥毒衝心外症牙關緊急口不能言兩手強直握拳頭低自汗身微熱與中風子癇相似其脈浮數十死一生醫者不識作中風治之更不審問必致損絶宜用白雹豆一味研末新汲水調斡開口灌之此症不正之婦有之妊娠兒在腹中哭宜黃連湯主之黃連三錢甘草一錢濃煎二味令母呷之又一方用半年空屋下鼠穴中土一塊令母含之即止一云臍帶上疙瘩乃兒口中含者因娠婦登高取物脫出兒口以此作聲令娠婦曲腰在地拾物使兒復得入口即止密齊云此症臨月將産婦人有之師母錢氏嘉靖戊子有娠九個月兒在腹中哭錢大驚令作男子拜而止之過二十日生師兄邦孝也娠婦日月未足而腹痛如欲産者用知母一味為末蜜丸雞頭實大酒化下
