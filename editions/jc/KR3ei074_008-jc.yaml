body:
  text: 卷之八胎動不安凡二論八方丹溪云胎動者因火逼動胎逆上作喘急用條芩香附之類夫黃芩乃安胎之聖藥安胎飲胎成之後覺胎氣不安或腹微痛或腰間作疼或飲食不美宜服或五六個月常服甚好此丹溪方也白朮當歸白芍熟地黃各一錢人參川芎條芩陳皮甘草砂仁蘇葉各三分生薑三片水煎密齋云胎動不安其因有七或因墜跌舉重觸動胎氣者或因縱慾無度觸動胎氣者或因七情失節觸動胎氣者或因誤食辛熱觸動胎氣者或因觸冒寒暑衝動胎氣者或因修造移徙觸犯胎氣者或因母多疾病胎失其養而不安者當各求之勿妄治也如因自高墜下或為重物所壓觸動胎氣腹痛下血宜用安胎散主之縮砂不拘多少和皮略炒勿令焦黑去皮取仁為末以當歸川芎等分水煎作湯調服如覺胎中熱其胎即安矣此方甚驗大抵妊婦不可缺此常服安胎易產如因夫婦貪歡不知避忌縱恣情欲以致衝任傷損觸動胎元胎動腹疼或為漏胎者宜如聖散主之鯉魚皮鮮者當歸熟地黃阿膠麵炒為珠白芍川續斷川芎炙草各等分水一盞苧根少許姜三片煎服如因喜怒憂思恐懼失節觸動胎氣不安者宜加減四物天香湯主之當歸川芎香附陳皮蘇葉因於怒加黃芩甘草人參以緩其中使肝氣平因於憂者加枳殼大腹皮以理其氣使脾氣平飲食進因於喜者加黃芩黃連麥門冬以瀉其火使心氣平因於恐者加茯神益智以安其神使腎氣平則胎自安矣如因恣食酒面炙煿厚味及誤服辛燥毒藥者以致邪火薰蒸胎動不安宜加味枳殼湯主之枳殼半兩黃芩一兩白朮一兩加黃連黃柏各二錢炒生甘草青竹茹水煎服三錢一劑如因起居不時沖寒冒暑動其胎者宜金匱當歸散加減因寒加蔥白蘇葉生薑因暑者加黃連人參知母如因修方動土移徙堆垛觸犯日月胎神以致不安者宜服前安胎散更請道高者於胎神所佔之方作符使禳之如因母疾病氣衰血少不能護養其胎以致不安者宜十聖散主之即十全大補加減也人參白朮地黃砂仁炒黃耆各五分炙草川芎歸身白芍炒各一錢川續斷八分水煎服以上胎動不安者諸症如有腹痛下血者各就本方加阿膠艾葉妊娠聚積附鬼胎凡七論三方六元正紀大論帝曰婦人身重毒之何如岐伯曰有故無殞亦無殞也王太僕云故有堅大癥瘕痛甚不堪則治以破積愈痛之藥是謂不救必死盡死救之蓋存其大也雖服毒不死也上無殞言母必全下無殞言子亦不死也又曰大積大聚其可犯也衰其大半而止過者死河間云藥之性味本以治疾誠能處以中庸與疾適當且如半而止之亦何疑於攻治哉要略云婦人宿有癥病經斷未及三月而得漏下不止胎動在臍者為癥痼害妊娠六月動者前三月經水利時胎下血者後斷三月下血也所以血不止者其癥不去故也當下其癥桂枝茯苓丸主之桂枝茯苓丹皮桃仁去皮尖炒芍藥各等分上五味為細末煉蜜丸如兔屎大每日食前服一丸不止加至三丸溫水下脈經云設令宮中人若寡婦無夫曾夜夢寐交通邪氣或懷作久癥瘕急當治下斬鬼丹治婦人鬼胎如抱甕吳茱萸川烏頭白姜蠶炒秦艽柴胡巴戟去心巴豆不去油芫花各一兩上為末蜜丸梧桐子大每服七丸蜜酒吞取去惡物取愈寸口脈洪而澀洪則為氣澀則為血氣動丹田其血則濕澀則於下胎冷若冰陽氣活胎陰氣必凝故必陰陽其下心僵假令陽經蓄血若杯陰為死血陽為蓄血問婦人雙胎其一獨死其一獨生醫其生下其死者其病則愈然後竟免軀何脈以別之師曰寸口脈衛氣平和榮氣緩舒陽施陰化精盛有餘陰陽俱盛故知雙胎今少陰微緊血則濁凝經養不周胎則偏大少腹冷滿膝臏疼痛腰重起難此為血理若不早去害母失胎宜芎歸湯川芎當歸各等分每服三五錢加蘇葉數莖酒水合煎死者即下未者即安妊娠惡阻凡三論五方二案惡阻者謂有娠而噁心阻其飲食也按內經精化於氣氣傷於味注云精肉內結郁為穢腐攻胃則五味居然不得入也女人重身精化百日皆傷於味也其斯惡阻之謂歟妊娠平日喜怒憂思七情氣滯以致中脘伏痰留飲有娠之後經血既閉飲血相搏氣不宣通遂使心下憒悶頭旋眼花四肢倦怠惡聞食氣喜啖鹹酸多臥少起甚則吐逆不自勝持治療之法順氣理痰自然安矣肥人是痰瘦人是熱密齋云妊娠惡阻者乃懷孕之常病不須服藥惟平日脾胃虛弱飲食少者必嘔吐大甚飲食不入者恐傷胃氣有害胎元必須治之然治此者必用半夏半夏有動胎之性必須制用炒過無妨如肥人惡阻旋覆花湯主之旋覆花川芎細辛減半人參各一錢白茯苓半夏歸身陳皮各二錢乾薑炮五分炙草一錢分作二服姜五片煎服又方加味二陳湯一名小茯苓湯陳皮白茯苓各四錢半半夏三錢白朮二錢四分炙草一錢上㕮咀分作二服水二盞姜五片烏梅一個煎八分服瘦人惡阻宜人參橘皮湯主之一名竹茹湯一名參補飲橘皮茯苓各二錢人參麥冬白朮厚朴薑製炙草各一錢竹茹雞子大一團水碗半姜五片煎服又方用白朮二兩條芩一兩砂仁炒五錢為末神麯糊丸白湯下如嘔吐不已者恐傷胃氣宜錢氏異功散加藿香主之白朮陳皮茯苓各一錢藿香葉人參砂仁各半錢炙草三分水盞半姜五片煎服或神麯為丸服尤妙一婦孕兩月嘔吐頭眩醫以參朮川芎陳皮茯苓服之愈重脈弦左為甚此惡阻病必怒氣所激問之果然肝氣既逆又挾胎氣參朮之補大非所宜以茯苓湯抑青丸二十四丸五服稍安脈略弦口苦幹食即口酸噫其膈間滯氣未盡行以川芎陳皮梔子生薑茯苓煎湯下抑青丸下十五粒而愈但口酸易飢此肝氣未平以熱湯下抑青丸愈後兩手脈平和而右甚弱此時肝氣既平可用參朮以防之服一月而胎不墮此丹溪治例也徽州商人吳儼妻汪氏年三十餘末子二歲正食乳經水未行一日因與夫爭言激怒得嘔逆病食入隨吐凡所食物鼻中即作其食臭請過二醫俱用反胃之藥不效請予治之其脈左三部沉實搏手右三部脈平予曰此有孕脈也當生二男汪曰我生過三子皆三歲而後娠今小兒方二歲經又未動不是娠也只因與我官人講口便有此病予曰身自有娠且不知之況醫人乎宜其服藥而不效蓋怒傷肝肝傳心諸臭皆屬於心心傳脾故隨所食之物即作其物氣出也嘔逆食臭皆肝心二臟之火炎上之象也以黃芩一兩黃連白朮陳皮香附童便炒黑白茯苓各五錢砂仁炒二錢共為末神麯糊丸綠豆大每五十白湯下未五日而安後生雙男
