body:
  text: 卷之十一妊娠心腹腰諸痛凡三論九方妊娠以安靜為貴但有心腹諸痛便是胎氣不和此胎氣之為母病者也若因飲食不調惱怒不已或素有痰氣發作無時者此母病之害其胎氣也須分治之丹溪云凡心氣諸痛不可用參朮補氣其痛愈甚師謂治諸心腹痛者用香蘇散加砂仁最妙其二三月娠忽心腹腰痛不安此肝氣不和也當歸三錢阿膠珠二錢炙草一錢蔥白四錢水煎其三五月娠忽心腹絞痛者此心氣不和也大棗十四個燒令黑鹽煅一錢為末取一撮許酒調服愈其娠婦心痛氣欲絕者火龍散主之艾葉末鹽炒一兩半茴香炒川楝子去核各一兩上為末每服二錢水一盞煎七分食後服其娠婦腹中絞痛心下急痛者當歸芍藥湯主之白芍藥四兩當歸三兩白茯苓一兩澤瀉一兩川芎二兩炙草一兩共為細末每服三錢食前溫酒調服蜜丸亦可其妊娠無故下血腹痛不可忍或下黃汁如漆水如豆汁野苧根炒金銀花各一兩酒水各一盞煎服其娠婦素有冷氣心痛如刀剌及腹痛者加減當歸散主之當歸香附炒黑川芎各三兩青皮二兩吳茱萸半兩炮七次上為末溫酒調一錢服無時其娠婦腰痛不可忍者通氣散神妙破故紙不拘多少瓦上炒令香上為末嚼胡桃肉半個空心溫酒調服二錢其因於七情者前方香蘇散加砂仁木香各五分其因於飲食者香蘇散加白朮枳實各一錢砂仁五分妊娠痎瘧凡一論四方瘧者苛毒苦惱之名也寒則凜凜湯火不能御熱則蒸蒸冰雪不能解所謂來如風火去似微塵易受而難退也有孕之婦豈堪忍受方其初得急驅逐之及其久也須和解之勿犯胎氣勿傷胃氣此治之之大要也初病之時小柴胡合四物湯以解之解之不退宜常山飲截之知母川常山各二錢炙草一錢烏梅一錢酒水各盞半桃枝七寸露一宿發日五更服面東如吐勿忌得吐即愈其瘧久不可再截只以補脾和胎為主宜加味異功散主之人參白朮白茯苓炙甘草陳皮當歸黃芩柴胡等分上為末每服一錢米飲下日三服得汗而解或加九肋鱉甲作丸服之妙如寒多熱少者驅邪散主之良薑炒白朮草果仁藿香葉陳皮縮砂白茯苓各五分炙草二分半姜五片棗一枚服不拘時又治食瘧如熱多寒少者加味白虎湯主之生地黃錢半黃芩麥冬人參知母葛根各一錢石膏三錢甘草五分烏梅半個水煎亦治暑瘧
