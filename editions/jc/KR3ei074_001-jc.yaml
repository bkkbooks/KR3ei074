body:
  text: 卷之一全嘗著廣嗣紀要一曰修德以積其慶二曰寡欲以全其真三曰擇配以昌其後四曰調元以卻其疾五曰協期以會其神遵而行之有子之道也若山水之靈祈禱之應必有德無欲者天地交感志意潛通可茀無子而獲孔釋抱送之祥矣否則徼福於冥冥之中其不為天地厭之者幾希修德篇第一巢氏云夫人無子者蓋有三焉一者墳墓不嗣二者夫婦年命相剋三者夫疾婦病皆令無子若夫疾婦病可以服藥而後能有子余者皆不可治也密齋著修德積慶之銘曰民之有生宗祀攸系不生不育人道乃熄天不棄人惟人自棄厥動匪彝自求禍戾無高不摧無升不墜盛衰相乘四時之序積善之家慶流不匱栽者培之造化之秘謹按人之乏嗣者或氣數將窮脈絡當絕或驕奢已極福澤少減或殘忍太甚罪業難逃苟非省躬悔過積功崇德則不能轉禍為福也故曰君子修之吉太上感應篇十種利益一收街市遺棄嬰兒倩人看養俟年十五願識認者還歸父母團圓二每冬十一月初三為始收六十以上十五以下乞丐貧人入本家養濟院每日給米一升錢十五文至來年十一月初三日滿一年令其自便求趁三普施湯藥應驗救人病苦四施棺木周給無力津送之家五使女長大不計身錢量給衣資聽其適人六專一戒殺救護眾生遇有飛走物命買贖放生七每遇荒歉之年其糧貴糴賤糶賑濟貧民八應有寺觀損壞者修理之聖像剝落者為裝飾之或橋梁道路溝渠不通者咸為治焉九有遠鄉士夫客旅流落者酌量遠近以助裹糧而周急還鄉十居權司凡遇冤枉必與辨明密齋云十種利益如收養乞丐貧人一條惟公侯宰相之家得為之不如遇有飢寒者即周急之如施棺木一條所濟有限不如見路旁之死人暴露之枯骨即倩人掩埋之如放禽獸一條不可為例恐有捉捕來求利者未免反傷其生也如貴糴賤糶一條不如豐歉平糶勿論貴賤如修理寺觀裝飾神像必親監視之恐被欺罔虛報也昔東京有一焦公三世無嫡嗣遂為商旅遊玩名山尋訪至人問其因果及至京都見一老僧聲清而遠目視精光數與談論語言甚異故就席而坐僧曰有何所論焦曰貧家三世無嫡嗣奈何僧曰無嗣者有三一宗祖無德自己無行二夫婦年命恐犯禁忌三精神不守舍妻妾血寒有何法術焦再拜告曰願聞一言僧曰不難先修德後修身三年之後可到五臺山當授異方說畢忽不見焦自遇老僧之後時時行方便種種積陰功遇人臨難者效觀音之救苦見物垂死者體太上之好生行恩布德如此三年竟往五臺山尋訪老僧數日不見乃忽見行童手持一書言曰老師傳語大夫功成行滿回宅合藥志誠服之富貴子孫隨念降生焦公曰但得嫡子足矣何望貴子乎於是生焦員外後員外養子不肖嘆曰有何損德如是忽遇一道人云汝有憂色何不往五臺山見老僧焦氏頓首遂往五臺山決其因果至五臺山不見老僧只見行童曰老師昨日言員外今日到山令行相接也再三傳語何必來問但依父行愚者自賢爾後必生賢德子孫焦氏曰豈愚者反賢乎行童曰昔竇氏五子皆不全形後行恩布德皆拜科第焦氏拜謝而歸密齋云修德莫如悔過過而不悔則累其德矣禱之於天不若反求諸己反身不誠則獲罪於天矣此無子之報應也良方論云分野異域則所產有多寡之宜吉事有祥則所夢各達其類是故荊揚多女雍冀多男熊羆男子之祥虺蛇女子之祥是皆理之可推也
