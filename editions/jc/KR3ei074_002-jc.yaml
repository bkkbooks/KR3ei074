body:
  text: 卷之二寡欲篇第二經曰丈夫二八腎氣盛天癸至精血溢瀉陰陽和故能有子女子二七而天癸至任脈通太衝脈盛月事以時下故有子倉公云男子精盛以思室女子血盛以懷妊密齋云男女配匹所以廣胤嗣續綱常也厥系匪輕求子之方不可不講夫男子以精為主女子以血為主陽精溢瀉而不竭陰血時下而不愆陰陽交暢精血合凝胚胎結而生育蕃矣不然陽衰不能下應乎陰陰虧不能上從乎陽陰陽牴牾精血乖離是以無子昧者曾不知此乃拂自然之理謬為求息之術方且推生克於五行蘄補養於藥石以偽勝真以人奪天雖有子孕而不育育而不壽者眾矣褚氏遺書云男子二八而陽精溢女子二七而陰血滋陽精陰血皆飲食五味之實秀也男子精未通而遇女以通其精則五體有不滿之處異日有難狀之疾陰以痿而思色以降其精則精不出小便道澀而為淋女子天癸既至逾十年無男子合則不調未逾十年思男子合亦不調不調則舊血不出新血妄行雖合而難子師云古人男子三十而後娶女子二十而後嫁正如褚氏之論恐傷其精血也故求子之道男子貴清心寡慾以養其精女子貴平心定氣以養其血何也蓋男子之形樂者氣必盈志樂者神必蕩不知安調則神易散不知全形則盈易虧其精常不足不能至於溢而瀉也此男子所以貴清心寡慾養其精也女子之性偏急而難容情媚悅而易感難容則多怒而氣逆易感則多交而瀝枯氣逆不行血少不榮則月事不以時也此女子所以貴平心定氣養其血也抑又論之孟子曰養心莫善於寡欲寡欲者尤男子之至要也蓋腎藏精肝之脈環於陰器而出其挺末心不妄動則精常溢瀉肝實而陽道奮發矣苟心慕少艾縱恣無度則精竭精竭則少而不多精竭於內則陽衰於外痿而不舉舉而不堅堅而不久隱曲且不得況欲輸其精乎是則腎肝俱損不惟無子而且有難狀之疾矣要略曰脈得諸芤動微緊男子失精女子夢交桂枝龍骨牡蠣湯主之桂枝芍藥生薑各三兩甘草二兩大棗十二枚龍骨牡蠣各三兩水七升煮取三升密齋云此方乃固澀之劑非鎮心安神之藥也蓋神者精氣之主也神以御氣氣以攝精故人寤則神棲於心寐則神棲於腎心腎神之舍也晝之所為夜之所夢男子夢交而精泄女子夢交而精出是皆不知清心寡慾之道者也斯人也神不守舍從欲而動晝有所感夜夢隨之心不攝念腎不攝精久而不已遂成虛損或有神氣委靡念慮猖狂風邪乘其虛鬼氣干其正與妖魅交通者是又難狀之疾也詳見上卷辟邪丹宜鎮神鎮精丹主之人參一兩茯神一兩遠志甘草水煮去心一兩柏子仁一兩酸棗仁去殼一兩石菖蒲一兩白龍骨煅牡蠣煅各二兩半辰砂水飛五錢留一錢為衣以上共為末煉蜜丸如彈子大每服一丸棗湯下丹溪曰人受天地之氣以生天之陽氣為氣地之陰氣為血故氣常有餘血常不足何以言之男子十六而精通女子十四而經行是有形之後猶有待於乳哺水穀之養陰氣始成而可與陽氣為配以能成人而為人父母古人必待三十二十而後嫁娶可見陰氣之難於成而古人之善於保養則伸陽於腎有補無瀉正是此意又按禮記注曰惟五十然後養陰者有以加內經曰年至四十陰氣自半而起居衰矣又曰男子六十四而精絕女子四十九而經斷夫以陰氣之成止供給得三十年之用已先病矣人之情欲無涯此難成易敗之陰氣若之何而可以縱欲也或曰人在氣交之中今欲順陰陽之理而為攝養之法如之何則可曰主閉藏者腎也司疏泄者肝也二臟皆有相火而其繫上屬於心心君火也為物所感則易於動心動則相火翕然而隨雖不交會亦暗流而滲漏矣所以聖賢只教人收心養性其旨深矣天地以五行更迭衰旺而成四時人之五臟六腑亦應之而衰旺四月屬巳五月屬午為火太旺火為肺金之夫火旺則金衰六月屬未為土大旺土為水之夫土旺則水衰況腎水嘗借肺金為母以輔助其不足故內經諄諄然資其化源也古人以夏月必獨宿而淡滋味兢兢業業於愛護保養金水二臟正嫌火土之旺耳內經又曰藏精者春不病溫十月屬亥十一月屬子火氣潛伏閉藏以養其本然之真而為來春升陽發生之本若干此不恣欲以自戕至春升之際根本壯實氣不輕浮焉有溫熱之病夫夏月火土之旺冬月火氣之伏此論一年之虛耳若上弦前下弦後月廓空亦為一月之虛大風大霧虹霓飛雹暴寒暴熱日月薄蝕憂愁忿怒驚恐悲哀醉飽勞倦謀慮勤勤又皆為一日之虛若病患初退瘡痍正作尤不止一日之虛今人多有春末夏初患頭痛腳軟食少體弱仲景論春夏劇秋冬差而脈弦大者正世俗謂注夏病也若犯四者之虛似難免此夫當壯年便有老態仰事俯育一切隳廢興言至此深可驚歎古人謂不可見欲使心不亂夫以溫柔之感於體聲音之感於耳顏色之感於目馨香之感於鼻誰是鐵心漢不為動擾善養生者於此五個月出居於外苟值一月之虛一日之虛亦宜暫遠帷幕各自珍重保全天和庶可以滋助化源水得所養陰無虧欠與陽平然後陽得所附而無損越之變遂成天地交之泰何病之可言按丹溪此論四者之虛尤求子者之當謹也密齋云男精女血難成而易敗如此夫以易敗之陰從以無窮之欲敗而又敗故男不待於八八女不待於七七而早衰矣嘗見男子近女一宿數度初則精次則清水其後則是血敗之甚矣女子之血謂之七損上為乳汁下為月經交合浸淫之水與夫漏濁崩中帶下之物皆身中之血也加以生育之多豈不敗而又敗哉此求子之道男子當益其精女子當益其血節之以禮交之以時不可縱也色欲箴云惟人之生與天地參乾道成男坤道成女配為夫婦生育攸寄血氣方剛惟其時矣成之以禮接之以時父子之親其要在茲眷被昧者徇情縱欲惟恐不及濟以燥毒氣陽血陰人身之神陰平陽秘我體長春血氣幾何而不自惜我之所生翻為我賊女之耽兮其欲實多閨房之肅門庭之和士之耽兮其家自廢既喪厥德此身亦瘁遠彼帷薄放心乃收飲食甘美身安病瘳密齋作箴曰不孝之大罪在無子配匹之際以續宗祀時操井臼常侍衽席尤物移人勿被所迷苟或貪戀縱欲准危匪嗣之求為身之厲火盛水衰形槁色弊膏肓既入箕裘何襲覆宗殞命悔之無及茭山云形者精神之舍宇也氣血者精神之父母也所以男子養其氣以輸其精積精以全其神人身賴此以為根蒂蓋欲恬澹怡養古云毋耗我氣毋勞我神毋傷我血毋搖我精可以為守精神者矣今人但知養其外不知養其內養其外者養其口體者也但知以酒肉為滋補以逸欲為舒情絕不知守精神育子之法似乎經云以酒為漿以妄為常者矣是故多病無子或生而多夭古人養其內者養其心腎也不妄作勞年躋百歲故病少多壽也今世無子者多娶幼妾或寒經而不調或沸騰而多病所以未成先傷未結先壞精血愈耗神氣愈怯故無子或生而多夭也且人身精神有限安得用度無窮須當修省積精以養天真寡欲情而益眉壽如此則惜精愛身有子有壽其妙何如耶左傳晉平有病求醫於秦秦伯使醫和視之曰疾不可為是謂近女室疾如蠱非鬼非食惑以喪志良臣將死天命不佑公曰女不可近乎對曰節之淫生六疾六氣曰陰陽風雨晦明也分為四時序為五節過則為災陰淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾女陰物而晦時淫則生內熱惑蠱之疾今君不節不時能無及此乎按醫和所謂不節不時不能寡欲者也
