body:
  text: 卷之九妊娠子懸凡五論二方一案妊娠五六個月以後胎氣不和上湊心腹脹滿疼痛者謂之子懸嚴氏紫蘇飲主之紫蘇大腹皮陳皮川芎白芍當歸各六分人參甘草各三分薑三片蔥五莖水煎空心服亦治七情過傷胎動不安之病蔡元度寵人有孕夫人怒欲逐之遂成此疾醫官王師復處香術散用莪朮煨二錢丁香一錢甘草三分共為細末分作三服空心鹽湯調覺胸中如物推下之狀而愈古庵云婦人忿怒憂思過度以致胸腹之間氣刺滿痛此言良是蓋婦人上有舅姑丈夫事觸物忤不能自決而憂思忿怒沉鬱於中丹溪云氣鬱成火火載胎下榮衛不通則心腹之間脹滿疼痛俱作也宜矣妊娠子上衝心昏悶刺巨闕穴在鳩尾下一寸是下針令蘇不悶次補合谷瀉三陰交胎應針而落如子手掬心生下子有針痕頂母心向前人中有針痕向後枕骨有針痕是辨云按十四經發揮云凡人心下有膈膜前齊鳩尾後齊十二椎周圍著脊所遮膈令濁氣不使上薰心肺是心在膈上也妊娠之婦若子上衝至膈則兒之在腹指未能執物尚堅握而不伸者又有胞衣裹之豈能破膈握心哉心為一身之主神明出焉不容小有所犯豈有破沖掬而不死哉蓋以其上衝近心故云爾如胃脘痛曰心痛之類是也學者不可以辭害意密齋云五臟系皆通於心而心通五臟系也故胞門子戶上通心系胎氣和則安靜而不動胎氣不和則伸縮轉動牽拽其系而心痛也如物懸墜之狀名曰子懸妊娠子煩凡七論九方妊娠四月六月多苦煩悶蓋四月屬少陰君火以養精六月屬少陽相火以養氣所以如是又有不在此兩月分而苦煩悶者由將息失宜七情傷感而然也名曰子煩密齋云子煩之症皆屬於熱有虛有實更宜分十二經養胎之月各隨其臟氣治之此吾家傳之祕群書未載如妊娠食少氣弱者此虛煩也宜麥門冬散主之麥門冬白茯苓防風各一分人參半錢水一盞薑三片淡竹葉十片煎七分服妊娠氣實體壯者此實煩也宜竹葉湯主之白茯苓防風麥冬條芩知母各一錢淡竹葉十片煎服如初受胎一月二月此足厥陰肝少陽膽二經之脈所養也此時精血混合胞胎融結肝膽氣逆使人煩悶不安嘔吐惡阻柴胡湯主之柴胡錢半赤茯苓麥冬條芩各一錢人參橘皮甘草各五分水盞半生薑三片煎八分溫服如妊娠三月四月手心主包絡少陽三焦二經之脈所養二經皆屬相火其氣逆令人煩悶不安口乾舌燥加味竹瀝湯主之淡竹瀝一合黃芩麥冬知母各一錢白茯苓錢半上㕮咀水二盞入炒黃柏三分煎一盞入竹瀝再煎一二沸服如妊娠五月六月此時屬足太陰脾陽明胃經之脈所養若因飲食勞倦所傷以致氣逆令人腹脹煩悶不安者和胎飲主之白朮白茯苓條芩各一錢厚朴制麥冬枳殼炒各五分甘草二分水煎食遠服如妊娠七月八月此時受手太陰肺陽明大腸二經之氣所養若因形寒飲冷所傷以致氣逆令人喘咳煩悶不安者知母飲主之白茯苓黃芩各二錢半知母麥冬炙草各一錢六分桑白皮地骨皮各一錢分二帖水二盞煎一盞入竹瀝一合再煎沸服如妊娠九月屬足少陰腎經脈養此時胎形俱足如有煩悶不安者乃胎肥作熱也宜苓朮枳殼湯主之條芩錢半白朮枳殼炒各一錢生甘草五分淡竹葉十二片煎空心服妊娠子滿凡二論一方一案妊娠至七八個月此時受足太陰脾經手太陰肺經之氣已足形體俱成毛髮漸生其婦奉養本厚安居太過胎元肥壯濕熱內盛腹大如鼓腹滿下墜逼迫子戶坐臥不安謂之子滿經云諸濕腫滿皆屬脾土諸氣膹郁皆屬於肺宜東垣和氣飲主之白朮黃芩各錢半大腹皮枳殼炒各一錢蘇葉莖砂仁各五分炒炙草三分水煎徐太和之妻娠八月得子滿病他醫作子懸治不效腹滿轉甚胎墜下迫玉門大張胞形外露但仰臥不能坐勢危請密齋師治之診其脈兩手俱大堅搏手謂其夫曰令正病無害乃雙胎也胎肥氣弱不能束約故下墜耳用束胎和氣飲主之加人參一錢升麻炒三分服三劑胎復上而安後生一男一女要略云婦人懷娠六七月脈弦發熱其胎愈脹腹痛惡寒者小腹如扇所以然者子臟開故也當以附子湯溫其臟方未見妊娠子腫一名子氣凡三論五方二案戴云子腫者謂夫人手足或頭面通浮腫者是也濟生方云曾有娠婦腹脹小便不利吐逆諸醫雜進溫胃寬氣等藥服之反吐轉加脹滿湊心診之胎死也久服下死胎藥不能通詳因得鯉魚湯其論曰娠妊遍身腫滿或心胸急脹名曰胎水遂去婦人胸前看之胸肚不分急以鯉魚湯三五服大小便皆下惡水腫消脹去方得分娩死胎可謂更生之人矣此症蓋懷娠腹大不自知覺人人皆謂胎娠如此終不知胎水之患也故著此論以諭後人當自省察三因鯉魚湯專治妊娠腹脹胎有水氣白朮五兩白芍當歸各三兩白茯苓四兩上銼細鯉魚一個不拘大小破洗鱗腹白水煮熟取汁去魚不用每服四錢魚汁鍾半薑七片橘皮少許同煮七分空心服以胎水去盡為度一方加人參澤瀉丹溪治一婦人三十八歲患有娠水腫鯉魚湯加五苓散治之愈要略云妊娠有水氣身重小便不利灑淅惡寒起即頭眩宜葵子茯苓散主之葵子一升茯苓三兩上二味杵為末米飲服一錢日三服小便利為度娠婦面目虛浮肢體腫如水氣者全生白朮散主之白朮一錢生薑皮大腹皮白茯苓皮陳皮桑白皮各五錢上㕮咀濃磨木香水半盞同煎八分去渣溫服如娠婦三月成胎之後兩足自腳面漸腫腿膝以來行步艱辛伏似水氣至於腳指間有黃水出又名子氣天仙藤散主之天仙藤即青木香苗莖也洗略炒香附炒陳皮甘草減半烏藥各等分木瓜三片木香等分水盞半薑三片煎服密齋云妊娠七八月後兩腳腫者未可醫治至産後其腫自消如兩腳腫甚者宜白朮茯苓散主之白朮白茯苓各二兩防己木瓜各三兩上為細末每服一錢食前沸湯調下日三服腫消止藥
