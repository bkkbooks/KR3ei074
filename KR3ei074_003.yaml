body:
  text: 卷之三擇配篇第三擇配之道莫善於卜人謀鬼謀再三則瀆文定厥祥克昌姬籙攘公之羭十年有臭或有於姜或喪其婦筮短龜長從長是福曲禮昏義欽哉三復要略曰男子脈浮弱而澀為無子精氣清冷脈經曰婦人少腹冷惡寒久年少者得之為無子脈微而澀此為居經三月一來年少得此為無子中年得此為絶産肥人脈細胞有寒故令少子密齊云按丈夫無子者妻妾之多何益妻之無子必用妾也人之娶妾不可不擇觀其相決之於卜命不足信蓋有假裝年月以欺人者勿擇其美有美者必有惡如叔向之母論夏姬之女是也勿擇其族類芝草無根醴泉無源也褚氏遺書云建平王妃姬等皆麗而無子擇良家女未笄入御又無子問曰求男有道乎澄對之曰合男女必當年男雖十六而精通必三十而娶女雖十四而天癸至必二十而嫁皆欲陰陽氣血完實而後交合則交而孕孕而育育而為子堅壯強壽今未笄之女天癸始至已近男色陰氣早泄未完而傷未實而動是以交而不孕孕而不育育而子厄不壽此王之所以無子也婦人有所産皆女者有所産皆男者大王誠能訪求多男婦人謀置宮府有男之道也王曰善未再期生六男夫老陽遇少陰老陰遇少陽亦有子之道也密齊按易曰枯楊生梯老夫得其女妻枯楊者老陽之象也老夫之年雖過八八之數受氣獨厚天真不匱故遇少陰乃能有子如枯楊之復生梯也若云老陰遇少陽此枯楊生華之象故易曰老婦士夫亦可醜也左傳晉叔向欲娶於申公巫臣氏其母曰子靈之妻殺三夫一君一子而亡國兩卿矣可無懲乎吾聞之甚美必有甚惡是鄭穆少妃姚子之子子貉之妹也子貉早死無後而鍾美於是必將以是大有敗也昔有仍氏生女發黑而甚美光可以鑑名曰玄妻樂正後夔取之生伯封實有豕心貪婪無饜忿戾無期謂之封豕有窮后羿滅之夔是以不祀且三代之亡共子之廢皆是物也汝何以為哉夫有尤物足以移人苟非德義則必有禍某按叔向之母云甚美必有甚惡又云夫有尤物足以移人苟非德義則必有禍信哉言乎嘗見人有美妻妾者胎孕未成形體先壞身且不保安望子耶昔康公遊於涇水獲三女以歸其母戒之曰吾聞獸三為群人三為衆女三為壑汝小邦德微不能享當獻與王康公不聽竟以亡國密齊著針曰人有恆言子生衆母寵人太多恐非其福夫也不良賤黃貴緑妻有偏心終朝反目妾婢失防中冓之辱設有遺孽易姓亂族克偕伉儷自有嗣續梁鱣年三十未有子欲出其妻商瞿曰吾恐子自晚年耳未必妻之過鱣從之後二年果有子袁韶父為郡吏夫婦俱近五十無子其妻資遣之往臨安買妾既得妾乃官家女也即送還之遂獨歸妻問妾安在告以故且曰吾思之無子命也我與汝夫婦年久若有子汝豈不育必待他婦人乃育哉妻亦喜曰君設心若此必當有後明年生韶既長為參政知事齊馮勤之父自恥短陋恐子孫類也為子孫娶長大之妻鄉里有女長而陋相言其貴娶之而生勤長八尺仕至尚書金丹節要云骨肉瑩光精神純實有花堪用五種不宜一曰螺陰戶外紋如螺螄樣旋入內二曰紋陰戶小如箸頭大只可通難交合名曰石女三曰鼓花頭繃急似無孔四曰角花頭尖削似角五曰脈或經脈未及十四歲而先來或五十五六而始至或不調或全無此五種無花之器不能配合太陽焉能結仙胎也哉男子亦有五種病一曰生原身細小曾不舉發二曰犍外腎只有一子或全無者三曰變未至十六其精自行或中年多有白濁四曰半二竅俱有俗謂二儀子也五曰妒妒者忌也陰毒不良男有此五病不能配合太陰乏其後嗣也
