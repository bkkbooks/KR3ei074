body:
  text: 卷之十五育嬰方論諺云寧醫十男子莫醫一婦人寧醫十婦人莫醫一小兒非以小兒口不能言脈無可診為啞科歟傳曰如保赤子心誠求之雖不中不遠矣大抵小兒之病有三一曰稟賦不足二曰胎毒三曰乳食所傷蓋稟賦不足者羸父弱母精耗血衰胞胎之氣既虧血肉之軀先損既生之後目無精采啼聲不揚顱解發稀皮薄肉軟齒久不生行坐過遲者皆稟賦不足之病也宜大補腎地黃丸主之胎毒者父餌壯陽之丹母飲暖宮之藥交接無度淫火猖狂飲食不忌膏粱內變令兒受之丹瘤瘡疹驚癇臍風盤腸內吊之病作矣宜保嬰解毒丸主之乳食所傷者小兒腸胃脆薄乳食過多難以傳化而父母溺於護愛惟恐飢乏凡肥甘生冷與食之以致宿食成積久積成癖而吐瀉瘧痢腫脹腹痛疳蟲之病生矣肥兒丸主之小兒肝常有餘病多驚癇琥珀抱龍丸主之脾常不足病多疳癆集聖丸主之八味地黃丸治稟賦不足腎氣虛弱骨髓枯竭囟大頭縫不合體瘦語遲行步多艱齒生緩者乾山藥去黑皮山茱萸酒拌潤蒸軟去核取肉焙乾熟地黃酒洗焙乾各五錢鹿茸蜜塗炙酒浸炙亦可川牛膝酒洗焙各四錢牡丹皮去心淨洗白茯苓去皮各三錢澤瀉二錢上銼焙研為細末煉蜜丸如麻仁大每服十五丸或二十五丸至三十五丸空心溫鹽湯下溫酒亦佳保嬰解毒丸治胎熱胎驚胎黃臍風丹瘭瘡疹一切胎毒甘草半生以解毒半熟以溫中黃連去枝梗解毒瀉火各三錢黃柏去皮蜜水炒瀉陰火二錢辰砂水飛鎮驚解毒二錢共為細末臘雪水杵和為丸如芡實大未周歲者半丸周歲者一丸燈心煎湯化下肥兒丸健脾胃進飲食消積滯殺疳蟲補疳癆長肌肉乃保嬰之第一方也人參去蘆三錢白朮堅白者去蘆五錢橘紅刮淨五錢白茯苓去皮四錢甘草去皮炙二錢青皮四花者去穰三錢縮砂仁二錢五分木香二錢五分山藥刮淨五錢蓮肉去皮去心五錢使君子去殼三錢山楂子蒸取肉三錢三奇神麯炒三錢共研為極細末用生荷葉包粳米煮熟去荷葉將米杵爛以淨布扭出再煮成糊為丸如麻仁每服二十五丸或三十五丸至五十丸陳倉米炒熟煎湯不拘時服琥珀抱龍丸抱者養也龍者陽之象也易曰震為龍一陽初生乃少陽之氣震為乙木內應乎肝小兒初生純陽之體肝常有餘故立此方以抱龍名者所以保養陽氣使不至於暴泄滋益陰精令得制乎炎光也常服祛風化痰鎮心解熱和脾胃益精神尤保嬰之第一方也真琥珀天竺黃白檀香細銼人參去蘆白茯苓去皮以上五味各一兩五錢粉草去皮節三兩枳殼水浸潤去穰麵炒黃色枳實去殼制各一兩硃砂水飛五兩山藥去黑皮一斤銼碎慢火炒令黃熟勿焦牛膽南星一兩金箔一百個另篩入藥中和勻上一十二味除硃砂金箔另制檀香不見火外九味或曬或焙同研為末和勻硃砂金箔每一兩重藥取新汲井水一兩重入乳缽內略杵勻隨手丸如芡實大約五分重一粒陰乾晴霽略曬日色燥甚則拆裂宜放當風處取其自干百日內兒每丸作三次一歲以上者一丸或二丸並用薄荷湯化服痰壅嗽甚淡薑湯下感冒風寒蔥湯下痘疹驚癇搐搦滾白水下心悸不安燈心湯下中暑迷悶麥門冬湯下凡合此藥品味必備但缺一味制不依法即不效也常用瓦罐收貯勿令泄氣集聖丸治小兒疳瘦發熱肚大青筋頭皮光緊發稀作穗喜吃泥土此治疳病之第一方也蘆薈五靈脂夜明砂洗淨焙縮砂仁陳皮青皮去穰莪朮煨木香使君子去殼煨各二錢黃連去皮梗乾蟾炙焦去足各三錢疳瘦加當歸川芎各二錢共為細末用獖豬膽二枚取汁和藥入糕糊丸麻子大陳米飲下
