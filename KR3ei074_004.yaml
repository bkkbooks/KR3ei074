body:
  text: 卷之四調元篇第四丹溪云無子之因多起於父氣之不足豈可歸罪於母血之虛寒況母血之病奚止虛與寒而已哉然古人治婦人無子惟秦桂丸一方其性熱其辭確今之欲得子者率皆服之無疑夫求子於陰血何至輕用熱劑耶劉宗厚云婦人無子多因經血不調或陰虛血少積聚痰氣嗜欲等致種種不同奚止虛與寒而已哉然經寒者亦有之但不可例為常法耳是以先生論此戒後人不得病機之的者斯藥勿妄行也況無子之因亦豈止於婦室者如東垣云李叔和問中年以來生一子至一歲之後身生紅絲瘤不救後三四子三歲皆病瘤而死何緣至此疾翼日思之謂曰汝乃腎中伏火精氣中多有紅絲以氣相傳生子故有此病俗名胎瘤是也汝試視之果如其言遂以滋腎丸數服以瀉腎中火邪補真陰不足忌酒辛熱之物其妻與六味地黃丸以養其陰血受胎五月之後以條芩白朮二味作散啖五七服後生子至三歲前症不復作今已年壯密齊著痘疹心要論胎毒云人之生也受氣於父成形於母胎毒之貽父亦有之未可專歸於母也觀東垣論李叔和之子紅絲瘤之病丹溪論鄭憲史之子得淋病皆其父之貽毒也故一治其父一治其子悉用瀉火解毒之藥以獲元吉今之求嗣者不知滋養真陰之旨喜服辛燥之藥以致陽火蘊隆陰水乾涸禍及其身豈止胎毒貽於子也哉鄭憲史子淋病見前調經論東垣滋腎丸治下焦伏火陰虛腳痛無力陰痿無子黃柏酒洗焙知母酒洗焙各一兩肉桂二錢上末水丸如梧桐子大每七八十丸至百丸食前百沸湯下褚氏云凡子形肖父母者以其精血嘗於父母之身無所不歷也是以父一肢之廢則子一肢亦肖其父母一目虧則子一目亦肖其母愚按男精女血混合成胎子形之肖於父母者其原固有所自矣然則求子者男當益其精而節其欲使陽道之常健女當養其血而平其氣使月事之時下交相培養有子之道也又云父少母老産女必羸母壯父衰生男必弱古之良工首察乎此補羸女則養血壯脾補弱男則養脾絶色羸女宜及時而嫁弱男宜待壯而婚愚按此言弱男羸女補養之法誠求子之所當講求者也蓋男強女壯精溢血盛自然有子何須補益惟男之弱者精常不足當補腎以益其精女之羸者血常不足當補脾以益其血補腎六味地黃湯精寒加五味子熟附子補脾參苓白朮散血少加歸芎又著針曰男精充盈陰血時行陽變陰合旺胎妙凝男益其精女調其經乃能有子螽斯振振羸男虧陽弱女虧陰雖交不孕雖孕不成調養之法上工所明不遇其良反成其疹茭山云或有感而不生或有感而孕孕而多墮其意何也感而不生者男子精盛之時女子陰血不足猶若老陰得其少陽枯楊生華種子下磽田之中故不發生又有男子精冷如冰精清如水雖女陰血縱橫而終身亦無子矣感而易孕者女子血盛男子精雖不足猶若老陽得其少陰枯楊生梯種子下於肥田之中故生而秀實也孕而多墮者男子貪淫無度女子好欲性偏兼以喜食辛酸熱物暴損衝任故有墮胎之患孫都憲淮海公年四十未有嫡嗣嘗問密齊廣嗣之道且語其故密齊告曰男女媾精萬物化生夫男子陽道之堅強女子月事之時下應期交接妙合而凝未有不成孕育者矣然男子陽道之不強者由於腎肝之氣不足也腎者作強之官肝者罷極之本肝之罷極由於腎之強作也故陰痿而不起不固者筋氣未至也肝主筋肝虛則筋氣不足矣陰起而不堅不振者骨氣未至也腎主骨腎虛則骨氣不足矣又有交接之時其精易泄流而不射散而不聚冷而不熱者此神內亂心氣不足也凡有此者各隨其臟氣不足而補之在肝則益其肝如當歸牛膝續斷巴戟之類在腎則益其腎如熟地黃蓯蓉杜仲之類在心則益其心如五味益智破故紙之類再用枸杞子菟絲子柏子仁以生其精使不至於易虧山茱萸山藥芡實以固其精使不至於易泄修合而服之其藥勿雜其交勿頻其動以正其接以時則熊羆之夢麒麟之子可計日而待矣命其方曰螽斯丸當歸牛膝續斷巴戟蓯蓉杜仲薑汁炒菟絲酒蒸枸杞子山萸肉芡實山藥柏子仁各一兩熟地黃二兩益智去殼破故紙黑麻油炒五味子各半兩上十六味各制研末稱定和勻煉蜜丸梧桐子大每五十空心食前酒下公又問女子月事或前或後或多或少無定期者何以調之密齊曰此神思之病無以治也公曰何故曰寵多而愛不周念深而幸不到是以神思不舒也以身事人而其性多傲以色悅人而其心多忌故難調也公曰據此意思制方平其氣養其血開其鬱宜無不可曰謹如教乃進調元丸方用香附子川芎陳皮以開鬱順氣白朮補脾利滯血當歸養心生新血又以治其二陽發心脾之疾香附子一斤醋浸春五夏三秋七冬十捶極爛曬乾研為細末十兩餘醋作糊當歸川芎白朮陳皮各五兩五味各為極細末浸藥余醋煮麵糊為丸如梧桐子大每五十空心食前酒下不飲酒小茴湯下密齊嘗見男子陰痿者多致無子不可不慮也惟其求嗣之急易為庸醫之惑或以附子石床脂為內補或以蟾酥哈芙蓉為外助陽事未興內熱已作玉莖雖徑頑木無用以致終身無子或有妖歿之慘者吾見此輩無辜而受醫藥之害遍訪諸方無越此者出以示人命曰壯陽丹熟地黃四兩巴戟去心破故紙炒各二兩仙靈脾一兩桑螵蛸真者鹽焙陽起石煅別研水飛各半兩上六味合陰之數研末煉蜜丸如梧桐子大每三十丸空心只一服溫酒下不可恃此自恣也戒之人有誤服壯陽辛燥之劑鼓動命門之火煎熬北海之水以致邪火妄動真水漸涸失其養生之道去死不遠矣治此之法曰滋水之主以制陽光腎者水之主也肺者水之化源也腎苦燥急食辛以潤之辛者肺金之味也滋其真水之化源以制其邪火之亢甚陽光既伏真水自生補陰丸主之黃柏鹽水炒四兩知母酒洗四兩熟地黃酒蒸焙六兩天門冬焙三兩各勿犯鐵各取末和勻煉蜜丸梧桐子大每五十丸空心食前百沸湯下制方古云腎苦燥知母之辛寒以潤之腎欲堅黃柏之苦寒以堅之熟地黃之苦甘寒以補腎之虛天門冬之甘寒以補肺滋腎水之化源所謂虛則補其母也丹溪曰婦人無子者多因血少不能攝精俗醫悉謂子宮虛冷投以辛熱之藥煎熬臟腑血氣沸騰禍不旋踵或服艾者不知艾性至熱入火灸則下行入服藥則上行多服則致毒咎將誰歸若是肥盛婦人稟賦甚厚恣於酒食之人經水不調不能成胎謂之軀脂滿溢閉塞子宮宜行濕燥痰用南星半夏蒼朮川芎防風羌活滑石或導痰湯之類密齊云肥盛婦人無子者宜服蒼附導痰丸蒼朮制二兩香附童便浸二兩陳皮去白兩半南星炮另制枳殼麩炒半夏各一兩川芎一兩滑石飛四兩白茯苓兩半神麯炒一兩上十味共末薑汁浸蒸餅丸梧桐子大淡薑湯下若是怯瘦性急之人經水不調不能成胎謂之子宮乾澀無血不能攝受精氣宜涼血降火或四物加香附柴胡黃芩養血養陰等藥東垣有六味地黃丸以補婦人陰血之不足無子服之能有胎孕仁齊云人之夫婦猶天地然天地陰陽和而後萬物生夫婦之道陰陽和而後男女生是故欲求嗣者先須調其婦之經脈經脈既調則氣血和平氣血和平則百病不生而樂乎有子矣古庵云婦人無子之因或經不勻或血不足或有疾病或交不時四者而已調其經而補其血去其病而節其欲夫如是則經調血足無病而交有時豈有不妊娠者乎雖然人之後嗣系乎天命抑或人事之未盡者可不究其心歟愚按婦人無子或經水不調自有調經之方血不足者莫如六味地黃丸素有疾病者莫如補脾參苓白朮散若夫子宮虛寒者不可不講苟執勿用熱藥之禁所謂執中無權猶執一也今採韓飛霞女金丹楊仁齊艾附暖宮丸二方於後以備治虛寒者之用也韓飛霞女金丹可代詵詵丸白朮當歸川芎赤石脂藁本人參白薇丹皮玄胡索白芷桂心白芍沒藥白茯苓甘草各一兩上十五味除石脂沒藥另研余以醇酒浸三日焙乾為末足數十五兩香附子十五兩以米醋浸三日略炒為細末足十五兩共十六味為末重羅和勻煉蜜丸彈子大磁銀器封收每取七丸空心雞未鳴時服一丸以清茶灌漱咽喉後細嚼以溫酒或白湯下咸物乾果壓之服至四十九丸為一劑以癸水調勻受胎為度胎中三日一丸百日止盡人事而不育者天也仁齊艾附暖宮丸兼治帶下白淫香附六兩俱要各時採者用醋五升以瓦罐煮一晝夜搗爛分作餅慢火焙乾艾葉去枝梗三兩吳茱萸去枝梗川芎白芍炒黃耆各二兩當歸三兩續斷兩半生地黃一兩官桂五錢共為細末上好米醋糊丸梧桐子大每五七十丸淡醋湯食遠下修合宜壬子日或天德合月德合日益後續斷生氣日精選藥材至誠合造精用經驗婦人服藥更戒惱怒勿食生冷男子亦要保養精神戒夜酒謹慎經期循素女房中之論無不效見素女論下梁武平齊獲侍兒十餘郤後憤恚成疾左右曰山海經云鶬鶊為膳可療使不忌郤茹之妒減半附養腎種子方枸杞子六兩用好水酒浸曬乾研細末不用火炒忌鐵器菟絲子六兩用好水酒浸浸滿日數畢為末七蒸七曬如干了少用酒拌濕蒸之研成餅則爛矣忌鐵器熟地黃三兩用好水酒浸浸畢用竹刀薄切曬乾研末忌鐵器乾山藥六兩不必制研碎忌鐵白茯苓六兩用好水酒浸去粗皮細研忌鐵器曬乾用竹刀切之當歸三兩用好水酒浸竹刀切曬乾研碎忌鐵川芎三兩去粗皮好水酒浸竹刀切曬乾研碎忌鐵蒼朮六兩米泔水浸用竹刀切曬乾研碎忌鐵肉蓯蓉六兩好水酒浸去鱗甲竹刀切曬乾研碎忌鐵小茴香六兩用鹽一酒鍾拌炒黃色去鹽細研用瓦鍋炒何首烏六兩用黑豆二三升將一半放罐底置首烏於其中仍將一半豆放其上著水煮一日去豆浸之竹刀薄切曬乾細研忌鐵器甘草十二兩去粗皮椎碎用蜜瓦鍋炒川椒十二兩去子瓦鍋炒黃色先用黃土細捶鋪在地上用紙二層置土上將炒椒在紙上以瓦盆蓋著去火毒上十三味冬天浸七日秋天浸五日夏天三日俱用竹刀薄切曬乾研細忌一切鐵器煉蜜為丸如梧桐子大不拘時每服五六十丸或酒或滾白水或鹽湯送下忌豆腐鹿肉二事年過六十者加人參一兩沉香一兩附血餘固本九陽丹血餘一斤選黑者不拘男女用皂莢煎湯洗淨清水漂過入口無油垢氣為度曬乾置大鍋內用紅川椒去梗目與發層鋪上用小鍋蓋定鹽泥祕塞上鍋底上用重石壓之先用武火煅煉一柱香後用文火半柱香以青煙去淨無氣息為度冷定取出研末雙絹篩過何首烏赤者八兩白者八兩先用米泔水浸竹刀刮去皮淮山藥八兩共何首烏去皮竹刀切成片用黑豆二升上下鋪蓋蒸熟曬乾赤茯苓八兩去皮牛乳浸一日夜白茯苓四兩人乳浸一日夜破故紙四兩酒拌砂鍋炒以香為度菟絲子四兩人乳一碗酒半碗浸一夕飯鍋上隔布蒸熟曬乾微炒研末枸杞子四兩去蒂梗酒拌蒸熟生地黃半斤酒蒸蒼朮半斤去皮為末熟地黃半斤酒蒸龜板半斤酥油炙當歸四兩去尾酒浸牛膝四兩酒浸黑豆蒸以上各藥末煉蜜為丸如梧桐子大每服五六十丸藥酒送下藥酒方當歸生地黃五加皮川芎芍藥枸杞以上各二兩核桃肉一兩砂仁五錢黃柏一兩小紅棗二百個用無灰白酒三十六斤內分五斤入藥裝壇內密封隔湯煮之冷定去渣入前酒密封用附烏須種子方八制茯苓丸治一切虛損男子壯筋骨生心血烏鬚髮明目固精女人滋顏色暖子宮調經氣白茯苓二斤半須皮光結實者去皮打碎如棗大分為八處黃耆六兩切片水六鍾煎三鍾煮茯苓一分干為度肉蓯蓉四兩酒洗去鱗水六鍾煎三鍾煮茯苓如前人參六錢水五鍾煎三鍾煮茯苓如前甘枸杞六兩水八鍾煎三鍾煮茯苓如前破故紙五兩水八鍾煎三鍾煮茯苓如前何首烏半斤用黑豆一升煎水三斤浸首烏春秋二日夏一日冬三日將浸過首烏豆汁煮茯苓如前秋石四兩水三鍾化開煮茯苓如前人乳半斤煮茯苓如前將制過茯苓總入石臼內搗為細末用米篩篩過上甑蒸熱衆手為丸如梧桐子大生子者每日早晚一服每服四十丸鹽湯送下烏須明目用滾白湯送下忌燒酒犬肉一修合須用平定開成生氣續世黃道吉日先一日午時將諸藥煎制煮茯苓搗末待次日子時完成微火烘乾不見風日忌孝服婦人雞並四廢六不成日以上三方本集不載系附入
