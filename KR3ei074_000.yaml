front:
  text: 李之用廣嗣紀要序頃刻保命歌括推極人臣之忠載閲廣嗣紀要並有感於人子之孝夫孝莫大乎事親能養事之文也能嗣事之本也水源木實肇諸作者身重視源衍枝疏引之勿替親重後古稱三不孝惟後為大生生玄化之倪人稟玄化以生生又人道之極不然將與天地不相似奚哉其為善事親故寄晨昏於樓護悼緩急於傳西投車絶愛別鶴噓憂往乘所重惜語云天與善人乃其變者邁種之賢弓裘不續敦仁之士桂玉罔聞令為善者不能必之已信之天道而至疑於漢安世之榮若是乎嗣之不可不廣也迹古所談履巨降玄遐乎藐矣空桑之志幻徵蘭之兆幽甫生自嶽喜生自蓮麟見而曲阜懸弧龍感而芒碭隆準是皆非常之希覯天道之未定者在彼不能必已信之天道而此欲以未定求之難矣紀要者近取諸身因人之理順諸玄化者五輔以人事者七間有出自然之外而實範圍自然之中為愚夫愚婦之知能又能為賢智者之巧取詳哉乎其言之矣若乃修德寡欲諸篇冠諸卷首常觀德之不修孔聖猶憂寡欲養心七篇攸載其義正其説嚴其際實其感疾蓋不徒以方術誘人而使之趨醫案診視之已定參以湯劑湯劑之不宜運以心思默有探乎指下之微方外之意為人子者倘得是説而持之以此嗣親庶幾其有永乎將生生之説長已是不可以不傳也賜進士中順大夫黃岡李之用撰
