body:
  text: 卷之十六幼科醫案山中讀易研精宓義小往大來福壽均齊歲月云邁而無所之及其出壬人相扶持別號通仙業專於醫江湖逸叟七十有四幼科醫案暮年自敘胎疾嘉靖丁酉八月英山縣鄭斗門初八日初生一男命名廷試生五日不乳噴嚏昏睡請豫視之豫曰此臍風病也一名馬牙風小兒生後一臘之內尤急斗門驚懼豫曰無妨乃看其口中上齶有白泡子如珠大者三四個取銀挖耳刮去之斗門憐惜之情見於色去之未盡次日猶不乳鄰親金氏老嫗聞之傳語斗門以臍風之害斗門憂惶復請豫叩問臍風之病何如豫告之曰臍風之病不可治者有三臍腫腹脹大小便不通者名曰鎖肚口緊不開不乳不啼時作搐者名曰噤風環口青色口唇緊撮者名曰撮口令郎初病未至困也復以手法去其白泡而安斗門曰當用何藥豫曰兒在母腹之中賴母之血以養之及其生也食母之乳乳亦血所化也胃氣常脆穀氣未生豈能任其藥毒耶雖有古方不敢用也斗門曰若然則坐視其死而不救哉豫曰上工治未病中工治初病下工治已病治未病者十全八九治初病者十救四五治已病者十無一生也斗門曰治未病者何如曰兒初生時必先浴之後斷其臍斷臍之後以火灸其斷處臍乾未落常謹視之勿為兒尿所浸則自無臍風之病矣斗門曰治初病者何如曰但見兒噴嚏多啼少乳者即視其口中上齶有白泡子成聚者急以手法刮去之以軟布拭淨其血則臍風不發矣斗門曰治已病者何如曰不知以上二法其泡落入腹中或為鎖肚或為噤風或為撮口雖有神丹不能救也斗門謝曰請詳記之以為育嬰之法隆慶壬申羅田監生胡正衢次子生兩月病吐乳發熱昏睡不思乳請豫視之豫曰此傷乳病也先有一乳母其乳少又使一乳母佐之兒生兩月脾胃尚弱乳哺易傷二乳母恐兒之啼觸主之怒強以乳相繼哺之因此成病教令損其一日之乳其病自愈不必服藥乳母聽教次日果安驚風黃州府同知張命我縣知縣朱差人致書云本府張二守公子得風疾苦無良醫聞汝知醫且精轉我召汝汝當星夜速來是亦濟世之端功名之會也全奉命亟往視其病兩腮紅上氣喘急脈浮緩而濡此因傷食得之食傷脾脾虛不能養其肺脾為之母肺為之子母子俱虛兩腮紅者虛熱也上氣喘急者肺虛也脈浮緩而濡氣虛也時醫各以驚風治之用抱龍丸牛黃丸蘇合香丸不效豫告曰公子不是風病乃肺虛證也諸醫顧笑豫用阿膠炒成珠一服二分煎蘇葉烏梅湯化服三劑而安張公大喜厚賜而歸衆醫各有慚色羅田知縣朱云閣一女未周歲病驚風召全治之乃用瀉青丸治驚風之祕方也何故不效而搐轉甚豈喉中有痰藥末頗粗頑痰裹藥黏滯不行之故歟改用煎過作湯以薄綿紙濾去滓一服而效朱公大喜賜以儒醫之匾英山縣知縣吳前洲公子病驚風差人請全往治之至則衆醫聚議用藥無功吳甚憂懼而有千金之託全告曰公子病可治勿憂也乃用導赤散作湯吞瀉青丸一服而搐止復進琥珀抱龍丸調理三日而安吳公大喜羅田縣學教諭曾加一子病驚風先請萬石泉治之庠生也善醫時豫在庠因往問之曾留豫同醫石泉主小續命湯豫曰不可用也肝主風心主驚風火相煽乃發搐也續命湯多辛燥之藥恐反助火邪而病益甚也不如通聖散效石泉心服未盡劑而安蘄水縣庠生徐淑道一子病驚風先請張醫治之不效遣人請余時病七月矣發搐無時痰鳴氣急其勢危困豫按治驚之法先降其痰次止其搐後補其虛一言以蔽之惟治其火而已乃用河間涼膈散改朴硝為馬牙硝煎成湯入青礞石末調服之痰下喘止隨用瀉青丸導赤散二方相合作湯服之而搐止餘熱未除張主小柴胡湯竹葉湯涼驚丸豫不許乃用四君子湯加炒黑乾薑一服而身涼祖母蕭氏怪而問淑道曰莫非用芩連梔子令兒身冷耶淑道應其母曰所服者參朮乾薑非芩連也蕭命其子問豫治病之法後來有病莫為醫所誤也豫答曰大凡小兒肝常有餘脾常不足肝主風搐搦氣逆皆屬於肝經云太過則乘其所勝而侮所不勝故肝木旺則乘其脾土侮其肺金所以用參苓補肺甘術補脾也肝膽之火名龍雷之火水不能制寒不能勝必辛甘之藥從其性而伏之故用炒乾薑之辛熱合人參甘草之甘溫以瀉其火而身涼也張醫聞而驚服乃命其子從豫講幼科豫盡以其術教之羅田縣富室胡淑卿一子病驚風先請甘醫治之甘乃吾妾之兄授以幼科其術頗明用瀉青丸不效復請豫至吾恐其丸劑太緩作湯加全蠍服之不效豫思藥之不效不對病也於是親視其發驚之狀其子昏睡醒則大笑一聲復作貓聲而後搐也豫曰怪得瀉青丸不效此非肝病乃心病也用導赤散一劑而搐止淑卿大喜詳問其故豫曰心屬火笑者火之聲也火生在寅屬虎貓聲者虎之聲也心為君主不可輕犯小腸為之府導赤散以瀉小腸之火則心火自平矣又一富室張世魯子病驚風迎豫往治之時病已十七日矣目右視而眨口右張而動手足向右掣引舌上黑苔勢已危急豫謂世魯之父希賢曰令孫病劇宜急取薄荷葉煎濃湯洗其舌如黑苔去而舌紅則病可治否則不可治也洗之黑苔盡去以瀉青湯作大劑服之口眼俱定手足不掣以涼驚丸至聖保命丹調理十餘日而安又張族一寡婦吳氏有子周歲病驚風大小便不通請豫治之豫用五色三黃丸利其驚熱至聖保命丹定其搐縣學庠生汪元津一子年五歲傷食成瘧瘧後發搐乃脾虛病也請豫治之豫謂元津曰凡治驚風必用瀉青丸導赤散雖良工不能廢其繩墨也今在令郎必不可用非豫不能理此疾也願得女衣一套與公治之元津曰但得小兒安何止女衣哉豫用調元湯琥珀抱龍丸服之而搐止但目不能開昏昏喜睡父母憂之豫思脾虛極矣脾主困故喜睡目之上下胞屬脾脾虛故不能開也仍以調元湯服之以補其虛琥珀抱龍丸以安其神脾喜樂命平日所與作伴同嬉戲者環列床前取鼓鈸之器擊之或歌或舞以引之病兒之目乍開乍閉以漸而醒不喜睡矣後用肥兒丸調之兒病既安竟負前言又伯兄監生汪前川一子年四歲七月病驚搐請醫以拿法掐止之八月連發二次並以掐法九月又發乃遣人來問豫豫曰痰聚成驚驚久成癇幼科拿法即古之按摩法也病在榮衛者可以用之使榮衛之氣行亦發散之意病在臟腑則不能去矣驚久成癇痰塞心竅之中不亟治之必成痼疾古人所謂五癇者自此得之因制一方以黃連瀉心中之邪熱為君枳實半夏去胸中之積痰為臣硃砂寒水石之類墜之以安其神為佐甘遂以逐上焦之痰飲麝香以利竅為使神麯作糊丸如龍眼大每用一丸用獖豬心一個刀批開納丸於中縛而煮之待心熟取丸和心食之飲其湯以吞之名曰斷癇丸凡服豬心五個再不發矣英山縣聞宅一子年六歲病驚風請豫往治至則悶死衣棺具備豫視其形色未變手足尚溫謂其父母曰勿哭吾能活之與之針湧泉二穴良久而蘇父母喜而稱謝豫豫曰此兒之病得之傷食宿食成痰痰壅作搐今病雖愈宿痰未去恐他日復再作也當制丸藥以除其根不然神氣漸昏必成癇也其家不聽謂吾索利至次年八月果成痰迷之病大小便不知解去其衣水火不知避復求豫治之豫思其重醫之情因制一方以黃連山梔仁瀉其浮散之火牛膽南星白附子炮以去其壅積之痰茯神遠志石菖蒲硃砂以安其神麝香以利其心竅用獖豬心中血和神麯糊為丸如黍米大燈心煎湯送下調理半年不復發矣又與之灸風池曲池三里六穴而安蘄水縣陳宅一子年二歲病驚風失於調理成癇半月一發來求藥豫用六一散末分三包一包用青黛相和名安魂散寅卯時竹葉煎湯下一包硃砂相和名寧神散巳午時燈心煎湯下一包入輕粉少許名定魂散申酉時薄荷煎湯下調理半年而安大凡癇病初得之者十全八九如遇二三年後者不可治矣時醫有用吐法者有用滾痰丸下之者徒損胃氣百無一效有制壽星丸治之者一杯之水豈能減積薪之火哉豫壻李中庵蘄水縣之學生也年九歲時得癇病則昏僕口眼俱合手足不動喉中無痰但僵仆如醉人也豫知其心病乃制一方用東垣安神丸去地黃加茯神遠志石菖蒲以通其心竅南星珍珠末鐵花粉以墜其痰湯浸蒸餅丸如黍米大燈心煎湯下調理一年而愈子第四男邦治七八歲有癇病發則面先青慘目定視口中有痰如嚼物之狀昏僕一食頃即蘇豫教其母但見面青目定時即以鵝翎探吐其痰母依吾教前後葉痰二升許癇竟不發如此調理三年而安大抵癇病皆痰也雖有五獸之名各隨其臟詳見錢氏方中凡得此病氣實者控涎丹氣虛者斷癇丸病愈之後以琥珀抱龍丸調之未有不安但年深日久不可治也蘄水縣金谷山周小應子半歲病驚風迎豫往治之視其昏睡不乳發搐不休豫曰搐而不止止而復發此不治證也其家又請張醫張用掐法掐則目張口動乃護痛也捏其乳汁於口中則吞之有聲旁人竊笑豫之不能而稱張之術豫請再視其兒目斜視張曰看娘口張而動張曰要吃奶豫曰非也目斜視者睹不轉睛也口張而動者脾絶也掐而痛不哭者啼不出聲也吞乳有聲者乳汁如水下流汩汩非自吞也去生遠矣何術之足稱耶半夜兒死張亦逃去麻城縣新店童云衢一子生三月遍身有瘡一日瘡隱而發搐時豫在見素家因請豫視之曰但得瘡復出則驚止矣以瀉青丸方與之加白殭蠶全蠍遍身紅搐略止豫曰皮肉紅者瘡必出也不須服藥云衢求安之心太亟不信吾言或用拿法或服湯劑瘡久不見又發搐七日後而兒死大抵小兒生下三月變蒸未足臟腑未實不宜服藥或不得已而用之中病即止不可過也黃州府學庠生周小川一女生周歲病昏睡不醒頭傾項軟衆醫議作風痰治之時有管糧廳通判蕭取豫在府小川與豫視之豫曰頭者六陽之合也頭傾項軟者乃陽虛之病也非風也主調元散一服而安覷者稱奇疳病羅田知縣朱云閣只有一子年七歲甚珍愛之脾胃虛弱食多則傷食少則困形瘦而黑常使韓醫治之因其傷食則與枳朮保和丸以消導之因其困倦則與參苓白朮丸以補之時補時消精神日瘁將成疳矣豫告之曰公子之脾胃素虛不能消穀故食易傷也傷食而復消導之則脾益虛虛而復補脾未得實而傷者又至矣豈良法哉全進一方專以補脾為主內兼消導名肥兒丸公視其方以四君子湯為主加陳皮青皮木香砂仁山藥蓮肉使君子肉神麯麥芽山楂肉共為細末荷葉包粳米煮爛搗為丸米飲下命豫修制自此不復傷食肌肉漸肥矣縣學教諭許厚舉一子年十四歲吐血諸醫作痰火治之不效生員董萬卷薦全厚舉聽而請之全診其脈兩尺右關皆不足全告曰公子之年未及二八脈當沉緊今反不足當作胎稟怯弱之病全觀宗師體厚何以有此必夫人有虛病或乳少得之也厚翁聞而躍起大笑呼師母曰汝當初懷身時多病生小哥後無乳密齋之脈神哉問作何病治之全曰十六歲以後病此者曰癆十五歲以前病者曰疳疳即癆也宜用六味地黃丸以補腎治其胎稟怯弱之病參苓白朮丸補脾助其生長之氣病自安矣乃制二藥服之一月而安厚舉稱讚之全之名由此漸著矣監生王三峰有子年二歲多病請豫治之豫曰此乳少病也三峰曰母乳極多豫不應而遂行其父竹泉留之曰煩公調治必有厚謝豫曰若使全治必作少乳之病今曰乳多識證不明不敢醫也願別求明醫以治力辭而退時豫寄寓三溪書館中其夜東郊會川來訪問豫數日曾治幾病所得幾何豫笑曰只今早王三峰請去看其子病乃疳證也因乳少得之彼曰乳多吾不與治此兒成疳可惜不救會川聞知亟去三溪曰此會川之壻汝言太甚故去矣豫曰必與三峰同來公等少坐須臾會川果與三峰至謝曰今早多慢此兒之病與吾先在南京所喪之兒病症同乃疳病也今聞會川述先生之言正合吾心望推猶子之愛為我治之豫曰因乳多乳少治法不同請歸驗之明早再議各散去次早三峰復至曰先生之見神妙及昨夜歸問拙荊拙荊捏其母之乳果無乳也晝則嚼飯以哺之啖以粑果夜則貯水以飲之奈何豫曰欲使換其乳母則母子認慣不可換也若不使有乳婦人養之則此疾終難治也不如仍與舊母養之擇一少壯婦人有乳者夜則相伴以乳補之久而慣熟自然相親矣三峰曰有乳無乳其法異乎豫曰有乳之疳得之傷乳乃飽病也宜集聖丸無乳之疳得之失乳乃飢病也宜肥兒丸調理一月而安監生汪懷江有子年六歲病瘧久不已面㿠白發稀成穗腹脹食不作肌膚乃疳病也懷江一家凡有病者諸醫用藥不效惟豫治之所活者多是以留居其家朝夕甚恭豫重其情故於此子之病以養脾丸平其瘧肥兒丸治其疳調理半月而愈蘄水縣陸沉港李黃之妻程稀川之女也寡而一女五歲因傷風寒不愈變為瘧疾瘧止變為泄痢痢止成疳肌肉消瘦飲食減少日啖蓮肉十數枚其母恐怖遣人請豫往治之豫曰病名曰疳形色雖衰胃氣猶存病可醫也時有江西一醫萬鼎者其叔李莊留在其家學水煉秋石之法妄談此病不治豫笑曰勿患此女之病難治當患水煉秋石之不成也乃謂其母曰堅心服吾之藥勿為浮言所惑吾去矣待女病大愈不負吾功以集聖丸調理三個月而安復請豫謝之豫至其家女出拜貌甚妍豫問萬鼎何在家人答曰秋石不成今騙一騾而遠遁矣吾縣富室胡黑三長孫一歲病腦後啞門穴出一毒如桃大已潰白膿不幹請視之豫曰此無辜疳也法不能治或問何謂無辜疳豫曰全幼心鑑云有妖鳥名雎一名夜行遊女白晝不出夜則出飛此鳥無雄飛入人家有兒褓衣挂晾未收者則布毒其上兒著此即病而死掠取其魂化為己子是名無辜疳亦傳尸之類也故病則頸上有核針破之內有白粉況項後之疽又九不治中之一證也故云難治時有一老醫號鄧風子者以善拿法名人相慕之黑三請視其孫鄧曰可治豫曰久慕先生之名如治此兒之病名不虛傳鄧曰是不難乃留五日後而兒死矣鄧大慚而去又鄉中一小兒方二歲常利下緑水形瘦如鬼狀醫作疳病治之不效其父來問豫審其病狀曰此非疳病乃胎氣所害名曰鬾病者是也凡人家養子者勿與懷娠婦人抱之如胎稟強者則無此病胎稟怯弱者胎氣犯之即成鬾病如客忤之類若治此病只補其脾胃待彼兒生自然安矣宜肥兒丸主之咳嗽哮喘胡元溪戊子科舉人三十九歲始得一子時嘉靖丁酉也辛丑春病嗽請醫張鵬治之名醫也用葶藶丸乍止乍作至夏轉作又請甘大用治之吾所教者用五拗湯不效或以葶藶或以五拗發表攻裡其嗽益加至百十聲不止面青氣促口鼻血出勢急矣不請豫者豫先補縣學廩膳元溪與胡明睿蔡惟忠等嫉而害之不敢請也至是事急不得已而占之於筮得大蹇朋來之辭於是請豫豫以活人為心不懷舊恨欣然而往約以調理兩月而愈元溪曰何如是之難也豫曰自春至秋病已半年肺為嬌臟治之不易請勿懷疑看豫調理乃立一方用天麥門冬知母貝母桔梗甘草蘇子陳皮去白黃芩梔子仁白茯苓連進三劑咳只二三十聲口鼻血止元溪心中不安又請醫萬紹至豫心怪之欲留不可欲去則誤此兒之命觀其主方以二陳湯加防風百部杏仁紫菀桑白皮豫謂紹曰肺氣已逆升而不降吾方抑之其咳稍定防風百部升發之藥似不可用紹曰防風百部乃咳嗽之聖藥也元溪曰各有祕方何以沮之豫曰吾為爾子豈沮同輩如昔日同類之嫉吾哉乃摩其子之頭云勿多服藥病再發矣力辭而歸是日服其藥後氣上逆而咳百十聲不止口鼻血復來其子呼曰爺爺送了我命也其妻鄧娘子且怒且罵元溪心忙托吾妾母謝罪懇求豫治豫笑曰各有祕方吾決不敢奪人之功也待紹術窮吾自來矣不必強也元溪跪而叩頭曰明書不是願勿峻拒豫往其家鄧娘子出拜謝曰奴家丈夫不是望勿記心治好吾兒必重報謝其子手指白金一錠約重三兩曰權為利市望救我命豫恐多元溪疑願置一簿逐日登記病證藥方以為醫案元溪大喜仍用前方調理五日而血止乃取生茅根搗自然汁和藥服之血止只用前方或加款冬花杏仁以止其咳或去黃芩梔子仁加人參白朮以補其脾或去黃芩梔子加阿膠以補其肺調理二十日而安元溪問曰小兒之咳張甘二醫治之不效萬紹治之反甚先生治二十日而愈者何也豫曰方春之時多上升之氣肺感風寒當與發散葶藶丸乃攻裡之劑肺金本虛而反瀉之此一逆也夏天火旺肺金受克當用清金瀉火之劑五拗湯乃發散藥也用熱犯熱此二逆也一汗之一下之肺金大虛方秋之時氣應降而不降萬紹反用升發之劑此三逆也豫用收斂清降之藥以平其浮散之火火衰於戌時值九月故病易已元溪歎服黃岡縣省祭許成仁有子病嗽痰中帶血醫用茅根湯治之不效時豫在府請視其子且敘其所服之藥豫曰此吾家治咳血方也因胡元溪之子咳血而立在彼則可在此則不可許問其故豫曰彼病於秋肺旺時也此病於春肺衰時也彼病氣逆上而口鼻出血此病氣逆而痰中有血也病既不同治亦有別乃用阿膠為君杏霜瓜蔞霜貝母為臣蘇葉桔梗甘草為佐煉蜜作丸薄荷湯化而服之效致仕縣丞胡三溪一女素有哮病遇天欲雨則發發則多痰服五虎湯九寶湯即止不能斷根吾於三溪呼為知己思欲與之斷其根也一旦得之蓋痰聚而作喘痰去則止痰者水液之渾濁者也難經云腎主液液者水所化也腎為水臟入心為汗入肝為淚入肺為涕入脾為涎此腎喘也乃以六味地黃丸服之不復發矣一富室小兒先病瀉醫以藥服之乃作喘歸咎於醫請豫治之豫曰非醫之誤乃冷傷脾作瀉脾傳肺作喘脾為母肺為子傳其所生也用陳氏芎蠍散一服喘止而安後用此方治瀉後喘者良驗萬石泉乃賓蘭之父也一女病久嗽不止胸高氣急問治於豫豫曰此龜胸病也胸者肺之腑也肺脹則胸骨高起狀如龜殼吾聞其病未曾治之故無方也或者不可治乎石泉曰肺脹者氣實也當服葶藶丸豫曰病有新久證有虛實嗽久肺虛再服葶藶瀉肺之劑恐有虛虛之禍石泉不聽竟以是病卒吐嘔縣學教諭熊文村子二歲病嘔吐更數醫治之皆不效藥食入口即吐出也時學中諸友或嫉豫者短之至是病亟或與吾厚者薦之文村差人請全往告曰病可治也文村問用何方曰理中湯文村曰服多劑矣不效奈何全曰此在內經乃陰盛拒陽之病寒因熱用熱因寒用伏其所主先其所因則效矣時蔡惟忠在旁嗾之曰不必多談且看用藥何如豫曰吐止之後乃見吾能兄亦不必多談論也乃作理中湯一劑取獖豬膽汁童便各半杯和藥炒乾煎而服之吐立止次日諸友來問文村曰神矣哉藥入不吐其吐止矣公子稱渴以湯飲之復作吐全曰凡嘔家多渴者胃脘之津液干也當忍一二時吐止胃氣立津液生渴自止矣可將先藥渣再煎服之仍禁其飲食半日而安文村詳問同是理中湯他醫用之不效先生用之效者何也全對曰公子胃寒而吐當以熱藥治之寒盛於中投之熱藥兩情不得故不效也今以理中湯為治寒之主用豬膽汁之苦寒小便之鹹寒為佐以從其格拒之寒藥下於咽兩寒相得藥入於胃陰體漸弱陽性乃發其始則同其終則異故曰伏其所主先其所因也此軒岐之祕旨啓玄子之奧議張長沙之良法也文村稱善嘉靖戊午九月庠生王民肅季子半歲病吐先請醫甘大文治之亦吾之所教者用理中丸益黃散服之不納乳入即吐議請豫大文沮之民肅暗使人請豫往至則昏睡仰臥而努其身有作慢風之候豫謂民肅曰勢危矣取理中末三分用水一酒鍾煎至半鍾入獖豬膽汁童小便各一匙在內攪勻以茶匙灌之民肅曰恐吐豫曰不妨初進一匙少停再進一匙又少停進一匙命以乳哺之乳母曰怕吐豫曰不妨吮吸三五口令其止兒乃熟睡一覺而醒服盡其藥乳不吐身不努而安泄瀉湖廣右布政使孫公淮海隆慶元年五月有女病瀉諸醫治之不效身熱口渴日漸羸瘦醫作疳瀉主治病益甚公只一女憂懼不安有吏王濱江黃岡人知醫因豫曾治許成仁子咳血之病有效乃薦全於公公亟差人召全時七月十三日也全奉命而往小姐年五歲公命抱出視之全告曰瀉久氣虛津液不足故發熱而渴也渴飲湯水多則脾受濕而泄瀉不止腎益燥而渴轉甚瀉則傷陰陰虛則發熱也法當專補脾胃使津液生而先止其渴渴止則瀉亦止而熱自除矣不出旬日小姐大安公喜留居公𪠘書館中令其早晚調理之便全用白朮散作大劑煎湯戒勿飲水以湯代之未半日而進兩劑豫揣其肺為津液之主肺金太燥不能生水故渴不止乃加法制天花粉與葛根同等分只一服其夜渴減瀉亦少十五日仍用前方加天花粉十六日渴瀉俱止公問何不用胡黃連銀柴胡以退其熱全告曰胡黃連銀柴胡苦寒之性恐傷胃氣不敢用也只服白朮散其熱自除二十日身涼而熱除矣公大喜問全曾讀書否全以實告公因此加敬賜之坐問其病後調理之法全進參苓白朮散方作丸服之公嘗命全侍飲卮談經書子史律歷之學公文學之名朝野知之尤好佛經見全旁通三教忘其形迹全告歸公曰我先以禮記中鄉試後以書經中會試頗有文名今秋場屋中代巡取我作兩經總裁我入場欲留汝在此調理八月以寬吾愛子之心全告曰敢不奉命公於八月初七日入場屋中命其義男孫還朝夕相伴還極聰明先隨公在四川作廉使時公命學醫尤精於針十三日夫人嬌愛小姐太過誤與菱啖之小姐脾胃尚弱生冷易傷病喘面目浮腫夫人大驚使還請全以藥治之幸勿使老爹知也全使還覆命曰夫人勿憂有全在此還問當用何方全曰宜錢氏異功散為主治加藿香葉以去脾經之濕紫蘇以去肺經之風則安矣還如方只一服而腫去喘止還記其方二十九揭曉後公出場見其方喜謂全曰此可作一醫案留住至九月初十日賜全以冠帶歸知縣朱云閣只一子年七歲嘉靖戊午六月病瀉且渴請醫治之至七月中旬猶渴瀉不止豫被人牽告在省歸公亟差人召之全承命而往公抱其子出與全視之全曰公子大渴不止公曰病瀉非病渴也全曰瀉傷脾胃津液不足故渴也渴飲湯水浸漬腸胃故瀉不止勿治其瀉當治其渴渴止瀉自止矣公問宜且何方全對曰白朮散公曰前醫所用皆是方也不效奈何全曰用法不同公問有加減不同乎全曰無之按本方云常與服之常字有義白朮散乃治瀉渴之聖方也安得不效但醫者之藥劑小病者飲水多藥不勝水故不效也謂之常者以藥代湯常與飲之勿雜以水之謂也乃作大劑煎而飲之未盡劑而渴瀉俱止公由此知全賜以儒醫之匾胡三溪一子多疾托我調理年三歲病瀉時豫在英山教書三溪嘗學醫於我甘大用吾之所教者二人同議治之不效其兄胡元溪謂三溪曰今有璞玉於此雖萬鎰必使玉人雕琢之汝一子不請密齋治之可乎三溪始遣人請豫豫受其托義不可辭星夜來其家視其子疾乃傷食瀉也豫謂三溪甘子曰藥貴對病病貴識證證之未辨宜藥之不效也三溪曰曩與甘子同治瀉者皆公之教未敢異也然或證有異乎豫曰吾嘗立教瀉有三證有熱瀉糞色黃而渴有冷瀉糞色青而不渴有食積瀉糞酸臭而腹痛或渴或不渴此子之疾所下酸臭乃積瀉也用丁香脾積丸一服而愈三溪曰巴豆下積而止瀉何也本草云巴豆未瀉者能令人瀉已瀉者能令人止積去瀉止自然之理也萬賓蘭石泉之長子也以癸未年九月生次年六月病瀉與吾先子菊軒翁求藥治之隨止隨發石泉年三十一始生子愛子甚篤來請先子年七十六歲不能往命全往治之至其門石泉聞瀉甚僕於地起書牛牛字放木凳上云以牛謝之就以牛字卜其病豫曰牛下一橫凳乃生字也吾到令郎之病即愈矣豫取陳氏肉豆蔻丸合胃苓丸車前草煎湯下只一服而瀉止石泉曰嘗服令尊藥用一粒丹合胃苓丸服之止而又發再欲進一服豫曰小兒腸胃嬌弱不得已而用藥中病即止不可過也其瀉果止三日後身發紅斑狀如綿紋石泉傷寒活人書了在心曰瀉後發斑此與陽明證下之太早熱氣乘虛入胃之病同也宜服化斑湯只石膏性寒瀉後脾虛不可用也豫曰有是病則投是藥何謂不可請用之未盡劑而斑沒身涼庠生胡鳳原精於醫有子病瀉以理中湯治之不效復與吾兒萬邦正求藥正以理中丸服之亦不效復問豫豫曰長沙著傷寒正理論云傷寒下利宜理中湯不止理中者理中氣也治瀉不利小便非其治也五苓散主之令郎之瀉不止何不服五苓散鳳原如其言而果效胡逵泉東郊之長子也其子年一歲六月病瀉東郊遠出先請甘大用治之不效其母李夫人極賢遣人請豫豫視之瀉下頻並黃白而後重發熱而渴時天甚暑皮膚乾燥而無汗發稀成穗豫謂李夫人曰令郎熱瀉成疳矣瀉下頻並後重者裡熱也糞黃者脾熱之色也白者乳汁不化邪熱不殺穀也口渴皮膚乾燥發成穗者津液枯也乃用四物湯合黃連香薷飲乳母服之以解其暑毒初用四君子湯調六一散與兒服之以解其裡熱次用四君子湯合黃芩芍藥湯以止其瀉三用白朮散以止其渴四用白朮散加升麻以舉其下陷之氣五用白朮散加烏梅肉以收其滑瀉之氣皆不效李夫人託人問之豫曰五法不中病術將窮矣只有一法此兒有福必無慮矣乃以黃連木香訶子肉豆蔻乾蟾使君子肉砂仁等分為末粟米糊丸陳倉米炒熱煎湯下調理三日滿頭出熱瘡及小癤身有微汗渴瀉俱止李夫人謝曰吾兒得活先生再造之恩也吾子邦正辛卯年閏六月生壬辰年六月病瀉時豫遭蹶出外教書妾兄甘大用學小兒科於我以藥治之不效加以大熱而渴亟報豫歸問其所用何藥甘曰理中丸吾知其犯時禁也乃制玉露散澄水調服而愈嘉靖癸巳年六月邑中有屠家徐姓者子周歲半病瀉請甘醫之不效大熱大渴煩躁不安甘強豫往視之豫問曰向服何藥甘曰玉露散初服瀉已止因熱未除再與服之又瀉至今五日病益甚豫教可用理中湯加熟附子治之如服藥後越加煩躁再進一劑即效若不煩躁不可治也豫歸半月後甘攜三牲酒來吾家供獻藥王畢命其妹設酒請吾上坐舉酒跪而勸吾問何故甘拜曰祀藥王乃問前年祖保正乳名也病瀉用理中丸不效師教以玉露散止之今徐家子病瀉用玉露散不效師教以理中湯加附子止之何也豫曰理中丸之止瀉補中氣之藥也玉露散之止瀉解暑毒之藥也前年祖保病汝用理中湯是也中病即止不可再服因汝用之太過犯時禁也經云用熱遠熱故以玉露散解之今徐家兒病汝用玉露散亦是也中病即止不可再服因汝用之太過犯臟禁也脾喜溫而惡寒故以理中湯加附子救之甘曰如此則理中湯玉露散皆不可用也豫曰理中玉露正治暑瀉之藥當觀其證何如若瀉而渴者里有熱也先用玉露散煎服以解其熱渴止即用理中丸以補其中瀉而不渴者里有寒也先用理中丸以溫其中即用玉露散五苓散煎湯調服以解其熱利小便也甘曰師謂服理中湯後加煩躁者可治不煩躁者不可治何也曰夏至後一陰生坤乃六月之卦易曰坤為腹陰在內而陽在外坤屬土土愛暖而不愛寒玉露散雖治暑瀉之藥其性寒服之太過脾土受傷陰盛於內陽脫於外前日徐家兒病吾見其面赤目張口開唇燥大熱大渴此陽脫病也故用理中湯加熟附子以補其中氣扶陽而抑陰也如服藥之後不加煩躁者則脾為死陰不可救也必加煩躁則陰勝陽胃氣猶存爭藥不敵病故再進一服則陽勝陰退而安胡汴一子夏月病瀉醫用理中以理中氣五苓以利小便豆蔻丸以止瀉皆不效請豫治之吾見發熱昏睡腸鳴而利水穀不化曰此傷風泄瀉也經曰春傷於風夏生飧泄飧泄者謂水穀不化也初病時宜且黃芩芍藥湯加羌活防風發散之今病久中氣弱矣用建中湯加白朮茯苓服之三劑而安邑市中一小兒未周歲七月病瀉諸醫不效請豫視之曰面嬌唇鮮不可治也錢氏云瀉不定精神好者死其家不信請巫禳之數日死痢疾鄖陽撫治都御史孫公淮海女病痢時隆慶戊辰七月也承差王嘉賓馳驛來召全全奉命往自羅田至鄖凡五晝夜公聞全至亟召入見之大喜曰吾女自五月病痢起至今未安荊州襄陽德安鄖陽共四府醫官治之今得汝來吾無憂矣全曰先在湖廣仗臺下小姐之福幸而中病安得徼天功以自誇耶小姐萬福痢不足憂乃以河間黃芩芍藥湯加人參服之五日而安公謂全曰那四個醫官吾問他養其血而痢自止調其氣而後重自除當用何方彼皆不應今見汝所用者正此方也果效公於政暇時嘗語全曰小姐去年五月病瀉賴汝調理今年五月病痢又賴汝治效吾想小姐兩年之病都自五月得之非瀉則痢此何故也全曰脾虛故也嬌惜太過飲食傷脾脾者陰中之至陰也屬己土夏至一陰生離卦主夏納己一陰初生陰土尚弱柔加以飲食之傷故有病常在五月為瀉痢也公曰煩汝立一方調治勿使他年再病可也全曰諾乃以參苓白朮散方去扁豆桔梗加陳皮青皮木香砂仁使君子神麯粳米粉荷葉水煮糊為丸服之自此大安至今不復瀉矣知縣張鼎石公子生九個月病紅痢請全治之曰此傷熱乳病也公曰當服何藥全曰子母雙調乳母宜服四物合黃連解毒湯兒宜服香連丸七日而愈汪四竹之子媳周柳溪之女也病瘧且痢下白膿治更數醫半年不愈請吾治之用小柴胡湯合桂枝湯加當歸陳皮服二十餘劑而瘧愈隨以黃芩芍藥湯加人參治其痢不效豫曰藥不對病待吾思之悟曰此病得之內傷名為白蠱乃用升陽勝濕防風湯只一劑而安衆驚服曰神哉祝道山之長子年七歲病久痢不已求治於豫豫為制丸劑治之丸者緩也以治久病也用錢氏異功散合香連丸為主加豬苓澤瀉車前子以利其小便神麯麥芽以消其積滯訶子肉豆蔻炒乾薑以止其痢合之曰和中丸約二兩許服之未盡而痢止此為家祕治久痢不止方也汪望江年六十生一子年三歲病痢先請甘醫下之太過脾胃受傷中氣下陷瀉痢頻並又請張鵬以豆蔻香連丸並粟殼等止之痢甚後重而少物也請豫治之豫曰老年之子胎稟已弱痢宜下之此通因通用之法因人而施不可過也中氣下陷法當舉之陳莝未盡劫澀之方亦不可用也乃以錢氏異功散加木香黃連當歸白芍藥山藥蓮肉神麯作糊為丸服之十日後痢止元氣未復也只用前藥調之謝豫歸後遇往武當進香者楊大明陳德榮來辭望江望江先因子病有托二人便帶香疏之願二人問其病何如望江曰請萬密齋治好也二人曰我有阿魏治痢甚效望江即求五分作丸五粒與子服之豫復至其家望江以告豫曰阿魏性熱有大毒耗人元氣虛弱之人不可服也望江曰今早服一丸飯後服一丸服藥後熟睡未醒豫曰痢止矣何必服藥此藥太峻神氣被傷恐非正睡也試請呼之望江命其母呼之不應推之不知急請豫入房視之白睛張露氣已絶矣望江大慟詳記於此以為輕妄用藥之戒瘧疾知縣林樂田只一女年七歲習男裝官出則送至門內拱候升轎官入則拱俟於門內公篤愛之一旦病瘧三月一發醫以藥截之不效神倦形弱乃召全治之全曰脾胃虛矣法當補之公曰瘧之不絶何謂補脾全曰治瘧有三法初得之邪氣尚淺正氣未傷宜急截之不可養邪以害其正中則邪氣漸深正氣漸衰宜先補正氣而後截之不可常截使正氣益衰而邪之獨強也末則正氣衰甚邪氣獨存宜補其正氣使正氣復則邪氣自退也公曰善命全製藥全以平瘧養脾丸調理一月而愈仍禁其雞魚生冷蘄水縣團陂王桂屏之子病瘧三日一發請豫治之豫用胃苓丸合小柴胡湯方作丸服之初三日一發又間日一發後一日一發初於午後發漸移於辰時發桂屏問曰連日服藥瘧疾轉發急者何也豫告曰此瘧將退之漸也蓋瘧疾三日一發者邪氣深難已一日一發者邪氣淺易愈午後瘧者邪在陰分難已午前瘧者邪在陽分易愈今令郎之瘧自三日移作一日自陰分移至陽分故云將退之漸也時有麻城丁醫生來聞吾之論笑曰那有許多議論吾有祕方治瘧如神桂屏急欲其子之安求藥治之豫不知其所用者是丸是散也自此依舊三日一發發以酉時至次日巳時後始退豫見病辭歸桂屏留之甚堅豫曰令郎病將愈是丁先生一個祕方又勞我重費一番力前功落水矣桂屏亦埋怨丁丁慚而去豫留一月調理而安腫病萬邦瑞一女年十四年病腫寅至午上半身腫午至戌下半身腫亥子丑三時上下腫盡消惟陰腫溺不得出諸醫不識其病邦瑞不輕用藥請豫治之豫曰此腎肝二經病也腎者水臟也亥子丑三時水旺之時也肝屬木腎之子也水生於亥子醜二時肝膽氣行之時也足厥陰肝經之脈環於陰器故當其氣行之時陰腫而溺不得出也水在身中隨氣上下午時以前氣行於上也故上半身腫午時以後氣行於下也故下半身腫此病源也五苓散瀉水之藥也經曰諸濕腫滿皆屬脾土平胃散燥濕之藥也故以二方相為主名胃苓湯加生薑皮之辛熱助桂枝陳皮以散肝經之邪茯苓皮之甘淡助豬苓澤瀉以滲泄腎經之邪防己之通行十二經以散流腫上下之邪也服十餘劑而愈舊縣張宅一子瘧後病腫求豫治之豫曰此脾虛腫也與之胃苓丸用長流水煎燈心送下教以每日午時前後天氣和暖燒溫水於避風處洗兒洗畢床上被覆睡一時令有微汗甚佳此水漬法也經曰漬形以為汗調理半月而平復如常脹病汪元津幼子病腹脹按之甚堅食漸少元津之壻胡正衢與吾之壻李中庵兩親家也因此私親請豫治之豫曰此傷食病也以胃苓丸調理而愈發熱義官黃學儀有子病熱不退請先翁調理約以熱退厚謝一日先翁歸不樂全問其故翁曰黃家小兒熱今醫七八日不效是以不樂全問其狀翁曰日夜發熱小便赤大便難全曰父用何藥治之翁曰先服胃苓丸今服涼驚丸全曰不效翁問全曰汝能治此病否全對曰能之此名風熱乃肝病也宜用瀉青丸熱即退矣翁以是言告黃公黃公同來請全往視之真肝病也遂用瀉青丸治之五日而愈父喜謂吾母曰曩教兒讀書爾説我不教兒學醫吾曰醫出於儒爾不信吾有子矣一染鋪余姓者有子病熱諸醫汗之下之和解之皆不效請豫視之曰此虛熱也用調元湯加炒乾薑未盡劑而熱除吾之長男萬邦忠先翁年八十始見此孫篤愛之幼多疾一日病瘧後潮熱日瘦一日先父母憂之全告之曰此疳熱也用小柴胡湯加鱉甲當歸川芎陳皮青皮為丸服之愈腹痛王小亭之子胡三溪之壻也嘗病腹痛乃蟲痛也托豫治之豫用安蟲丸取下一蟲長一尺大如拇指引而伸之約長丈餘其形如線以火焚之後又胃脘當心而痛豫以草豆蔻丸治之不效心竊怪之是何痛也以吾治之三日不愈乃以手按而摸之問其痛在何處手不可近因悟曰上焦如霧有氣而無物也經云濁氣在上則生䐜脹者是也若痰飲若宿食若瘀血停在胃脘當心而痛者此物而非氣也凡痛手可按者虛痛也手不可按者實痛也氣之為痛有實有虛物之為痛有實而無虛也今痛在胸中手不可按非食則痰乃實痛也以小陷胸湯內取黃連枳實半夏控涎丹方內取甘遂白芥子加大黃黑牽牛神麯作糊為丸如蘿蔔子大薑湯下二十一丸其痛下在脘又進十四丸痛下小腹又進七丸利下黃涎半碗而安胡滂少喪父母伯母蕭氏養之嘗病腹痛伯父胡泮西請豫視之乃蟲痛也泮西曰何以辨之曰凡腹痛一向不止乃積痛也乍發乍止腹中成聚口吐涎水者蟲痛也用苦楝根白皮煎濃湯送下雄黃解毒丸取一蟲如指長如嬰兒形伯父母怪之以鐵鉗夾定請豫問之是何蟲也豫曰此三傳癆蟲也初起於父再傳其母三傳其子今取下矣此子之福也因命一婢夾定送至河中火焚之其婢受煙氣一口病瘵而卒自此斷根戶房吏聞安麻城人有子病蟲痛先翁嘗用雄黃解毒丸苦楝根煎湯下未見有蟲腹痛不止先翁命全與治之全思此蟲有神如二豎藏於膏肓之中針藥之所不能治也默思一法此食積所化也宿食成積積久成蟲食積之蟲所嗜者味也乃問此兒平生愛吃何物其母答曰喜吃煎炒於是擇上旬破日暗煎苦楝根湯勿令兒知用清油煎雞卵作餅十分香美兒欲食之故遲不與以少許啖之喉中涎出即取苦楝根湯送下雄黃解毒丸服藥下咽以卵餅與之似不愛矣半日後大泄取下黑蟲如蝌蚪子者約半盆盆中旋走以火焚之自此腹不痛矣啼哭知縣張鼎石在任生一公子少乳求有乳婦人為乳母年未一周病啼哭晝夜不止幼科甘大用陰結乳母鑽求進用至是召入視之初稱腹痛用理中丸不止又稱傷食用益黃散不止鼎石想起全名急差人請去抱公子出全觀其形色曰公子腮頰目赤乃心煩啼哭也公曰腹痛豫曰腹痛者面青公曰傷食豫曰傷食者面黃此心中有熱煩而啼也用導赤散加黃連麥門冬燈心煎服之次日早公差人促全入衙面語全曰昨夜哭更多何也全曰病安矣公曰病安何以哭不止全告曰公子啼哭三日夜不乳昨夜熱退心涼欲得乳而乳母在外故知往夜之哭病哭也昨夜之哭飢哭也公笑曰果然乳母五更到哭即止矣蕭敬吾聞之問豫曰先生何料之審耶豫曰識證既明用藥且當料之審矣胡三溪之子年一歲半日入後忽然大哭不止時七月七夕也三溪設酒請豫露坐庭中共慶牛女之會汪娘子見兒哭不止請全入視之曰無病須臾又請入問曰哭久不止必有病痛吾細察之無病飲未數杯汪不命酒出使人責其夫微言侵我三溪強豫再入仔細察之果非病也無病而哭必心中有所欲而不能言謂之拗哭乃問此兒今日所喜弄者何物也乳母答曰馬鞭子亟命取至乃笑而持之擊其乳母不復哭矣吾謂三溪曰令正娘子見兒哭不止説了許多間話今喜哭止必須盛饌痛飲一醉可也再設酒飲至半夜而止次早三溪以此言語人人皆曰密齋心聰或有據乎因問之豫曰有此一條小兒害相思病醫案也觸類而得誠有據也汪玉虹生子三日啼哭不止亟請豫去謂玉虹曰必斷臍失謹風冷之氣入於臍中腹痛而哭也玉虹曰我亦如此想乃取蘄艾炒熱搗如綿再烘令熱以封其臍冷則易之凡三易而哭止汪懷江生子二月夜啼不止請豫治之豫曰此肝熱也以瀉青丸竹葉湯入砂糖少許調服而安卵腫朱云閣公子病卵腫逾年不消成㿗疝矣嘗與全議其病全告曰足厥陰肝經之脈環於陰器肝之志為怒小兒性急多哭者常有此病一名氣卵常見人病此者不廢生育與壽無干公又曰有治法此病亦可治乎全告曰有治但勿求速效可也公曰病既有治雖一年有效何如全制一方用川楝子肉小茴香炒青皮不去穰山茱萸肉山楂木香當歸川芎海藻三稜莪朮二味用黑牽牛同炒去牛不用共為末神麯糊為丸溫酒下更灸臍旁穴而腫消矣知縣梁大公子年七歲常有疝氣病發則右邊卵腫上貫小腹下連睪丸約長五寸大如杵堅緊苦痛大小便難一旦病發公謂全曰聞汝幼科甚精煩為小兒治之全曰諾乃制一方用當歸梢青皮不去穰川芎山梔仁木通木香川楝子肉小茴香甘草梢豬苓桂附與醫生韓鳳岐取藥合服之二劑而安結核蘄水縣庠生朱震三長子年五歲病結喉下生一核大如李兩旁有小核相連者二三核托豫壻李中庵求藥豫制一方用東垣涼膈散方去甘草加龍膽草玄參貝母海藻麥芽粉共為末神麯作糊為丸如彈子大每服一丸研細溫酒調服七日而安矣豫用此方治活兒甚多團風鎮帥碧泉有子頷下一結核大如李誤聽俗醫之言能去之貼以藥一日丘長史定齋至其家見之謂碧泉曰若是結核不必治也久則自消碧泉不實告謬曰熱癤也自後核腫潰爛橫亙頷下請豫去其子口張脾已敗也終不可治監生王思泉有子年五歲耳後出結核二枚求豫治之豫曰此有二證無辜疳核不可治結核不必治也王子不聽吾言必請他醫治之妄用縱橫內消之毒劑核不少減胃氣乃傷而無救矣豫記此二條以為輕妄用藥之戒蟲疥吾長孫乃邦孝之子生下遍身生蟲疥豫制一方用烏梢蛇酒浸去皮骨取淨肉焙乾一錢苦參酒浸切曬乾取末一錢半白蒺藜炒去刺一錢半三味為末酒糊丸如粟米大每服十五丸竹葉煎湯下蟲疥滅迹不復發矣邑中有一小兒身生蟲疥醫用藥搽之瘡盡沒腹脹而喘求藥於豫曰幸未發搐尚可治也乃與雄黃解毒丸竹葉燈心煎湯下利黃涎瘡出而安或問豫曰蟲疥不可搽乎豫曰蟲疥者胎毒也宜用解毒之藥使毒散於外不可妄用搽藥逼之使反於內也搽瘡之藥必用砒硫水銀以殺其蟲藥毒之氣乘虛入里誤兒性命切宜慎之口瘡一小兒舌上生瘡口唇破裂吮乳不得日夜啼哭求藥於豫豫用洗心散入竹葉煎服以解其裡熱外用柏連散擦之效豫一小孫無父年周歲半生走馬疳瘡吾制一方用尿桶白垢刮下新瓦上炭火燒過五分五倍子殼內蟲灰焙二分半鼠婦焙乾二分半枯白礬一分共為細末擦之即愈
