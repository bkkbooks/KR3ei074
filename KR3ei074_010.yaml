body:
  text: 卷之十妊娠傷寒凡十五論十二方丹溪活套婦人胎前感冒風寒頭痛發熱或身體疼痛用四物湯合小柴胡湯或更加細辛白芷羌活防風等藥河間云大抵胎病天行從增損柴胡雜症從增損四物然春夏須從柴胡秋冬必用四物藥性寒熱病症虛實不可不察也又云治產前寒熱小柴胡去半夏謂之黃龍湯密齋云妊娠傷寒專以清熱安胎為主或汗或下各宜隨其五臟表裡所見脈症主治勿犯胎氣故在表發汗以香蘇散為主方半表半裡則和解之以黃龍湯為主方在裡則下之以三黃解毒湯為主方此吾家傳之秘活人甚多如古方六合湯雖分治詳明猶不及此切當凡娠婦傷寒勿論日數但見惡寒頭疼宜香蘇散主之紫蘇二錢香附子炒黑二錢陳皮一錢甘草半錢姜三片蔥五根煎服頭痛加川芎白芷各一錢名芎芷香蘇散假令得肝脈其外症善潔面青善怒其三部脈俱弦而浮惡寒里和謂清便自調也本方加羌活防風各一錢謂肝主風是膽受病也假令得心脈其外症面赤口乾善笑其三部脈俱浮而洪惡寒里和謂清便自調也本方加黃芩石膏各錢半謂心主熱是小腸受病也假令得脾脈其外症面黃善噫善思其尺寸脈浮而緩惡寒里和本方加白朮防己各錢半謂脾主濕是陽明受病也假令得肺脈其外症面白善嚏善悲不樂欲哭其尺寸脈俱浮而澀惡寒里和本方加黃耆防風各一錢謂肺主燥是大腸受病也假令得腎脈其外症面黑善恐其尺寸脈俱浮而濡惡寒里和本方加附子炮一錢謂腎主寒是膀胱經受病也附子犯胎用吳茱萸溫之可也河間云解利傷寒不問何經所受皆能解之謂不犯各經之受病雖不能解盡亦無壞症羌活湯尤益妊婦羌活二錢防風川芎黃芩甘草炒各一錢細辛三分半白芷一錢白朮錢半無汗用蒼朮水煎服無時其妊婦傷寒得之三五日後有惡寒發熱內有煩渴引飲小便赤澀之症此邪在半表半裡也宜黃龍湯主之柴胡二錢黃芩錢半人參一錢甘草一錢薑棗引如寒熱往來無汗口乾加葛根二錢去棗入蔥白三根如頭疼不止加川芎白芷各一錢去棗加蔥白三根如發熱有汗口渴加白朮瓜蔞根各錢半如脈浮大有力大熱大渴本方合人參白虎湯去薑棗如心煩不得臥本方加白茯苓麥門冬各一錢如嘔噦加半夏制白茯苓各一錢去棗如胸脅滿痛加枳殼炒香附子炒黑川芎各一錢如大便秘本方初加大黃五分得利則止不利加一錢以利為度其娠婦傷寒五六日後表邪悉罷並無頭疼惡寒之症止煩躁發熱大渴小便赤大便秘或利下赤水六脈沉實此病邪在裡也宜三黃解毒湯主之黃柏黃芩黃連山梔大黃等分水煎更隨五臟脈症加減假令得肝脈其內症煩滿消渴溲便難尺寸脈沉弦有力是肝經本臟受病也本方加當歸錢半甘草五分倍山梔假令得脾脈其內症腹脹滿譫妄其脈沉緩有力是脾經本臟受病也本方加枳實炒厚朴薑汁炒各錢半倍大黃假令得心脈其內症煩躁心痛掌中熱而噦尺寸脈沉數有力此心經本臟受病也本方加麥冬一錢竹茹一團倍黃連假令得肺脈其內症喘咳胸滿尺寸脈沉澀有力是肺經本臟受病也本方加葶藶炒一錢桔梗五分倍黃芩假令得腎脈泄如下重足脛寒而逆尺寸脈沉而石是腎經本臟受病也加乾薑炮五分熟地黃錢半倍黃柏其娠婦傷寒發汗後汗流不止胎氣損者加減當歸六黃湯歸身黃耆生地黃黃芩白朮阿膠珠炙草各等分浮小麥一撮煎湯盞半去麥每服五錢煎七分溫服其娠婦傷寒下後協熱而利不止胎氣損者宜加味黃芩湯黃芩二錢白芍白朮白茯苓炙甘草阿膠各一錢水盞半煎一盞後入阿膠再煎八分服其娠婦汗下後熱不除者虛也加味竹葉湯主之人參麥冬炙草阿膠生地黃各一錢竹葉十二粳米合引其娠婦傷寒差後發熱者宜黃龍湯四物湯主之因於食者本方加枳實其娠婦傷寒熱極發斑狀如錦紋者宜四物湯去川芎加黃芎人參知母石膏玄參大青葉主之其娠婦熱病護胎法夫妊娠感非時之邪熱毒之氣侵損胞胎遂有動胎漏血致害子母之命用白藥子不拘多少為末以雞子清調攤於紙上如碗大貼臍下胎存處干則以溫水潤又方以灶心土研細水調塗臍下干又易之又方以井底泥敷心下令胎不傷又方用干浮萍朴硝大黃炒蛤粉板藍葉共為末水調貼臍下安胎解燥熱和臟腑其娠婦值天行熱病壯熱百節疼痛不急治即墮胎柴胡知母葛根石膏各六錢大青葉八錢梔仁一兩升麻八錢蔥白切半盞水七盞煎三盞分四服服之其妊娠熱病六七日極者傷胎兒死腹中身冷不能自出須用暖胎藥服黑神散溫酒調暖胎自出評此不若用催生湯蒼朮二兩桔梗一兩橘仁六錢白芷桂心去皮各二錢炙草二錢乾薑炮當歸厚朴制芍藥半夏洗川芎枳殼炒各四錢杏仁炒木香各一錢水盞半薑棗引妊娠霍亂一論一方霍亂者陽明經病之別名也陽明者胃也蓋因平日五味肥膿腐積成痰七情菀結氣盛為火停蓄胃中乍因寒熱之感邪正交爭陰陽相混故令心腹絞痛吐利並作揮霍變亂故名霍亂如邪在上胃脘則當心而痛其吐多邪在胃脘則當臍痛其利多邪在中脘腹中痛吐利俱多吐多則傷氣利多則傷血血氣受傷不能護養其胎況邪氣鼓擊胎氣震動壽未有不殞者矣此危惡之症不可不亟治也宜前香蘇散加藿香葉治之香蘇散一劑藿香葉縮砂炒各五分如轉筋加木瓜一錢胎動不安加白朮錢半如夏月得之加黃芩錢半黃連一錢香薷二錢如冬月得之加人參白朮各一錢乾薑炮五分妊娠風痙又名子癇一論三方一案痙俗作痓乃太陽膀胱病之別名也論曰妊娠中風頸項強直筋脈攣急言語謇澀痰涎壅盛或發搐不省人事名曰子癇亦有臨月發風痓或暈悶倒地不識人吐逆如癇亦名子癇治各有方其因中風腰背強直時復反張無汗者宜防風葛根湯主之防風葛根生地黃川芎各二錢杏仁去皮尖麻黃去節各錢半桂枝少許獨活甘草防己各一錢上㕮咀分二帖每水盞半煎麻黃去沫入藥煎八分溫服以安為度不安連服勿間其有汗者或發搐不省人事者宜羚羊角散主之羚羊角鎊川獨活酸棗仁炒五加皮各半錢薏苡仁防風當歸川芎茯神杏仁去皮尖各四分木香甘草各二分半水鍾半姜三片煎服如上法其臨月發者宜葛根湯主之葛根貝母陳皮防風防己川芎當歸白茯苓桂枝澤瀉人參獨活石膏炙草各等分每帖七錢水二盞煎八分不拘時貝母令人易產未臨月用升麻代之密齋師在鄖陽時值鄖陽知縣一婢臨月患此病口眼喎斜腰背反張手足攣曲不省人事請師治之用黃連解毒湯方加硃砂末斡開口灌之稍定其夜生一男主謝曰以一劑之藥活二人之命其功大矣產後病尤昏迷不醒以七珍湯與之即安
